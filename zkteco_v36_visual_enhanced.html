<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZKTeco SpeedGate CAD v36 - Visual Fixed</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); }
    .led { animation: ledPulse 1.8s infinite alternate ease-in-out; }
    @keyframes ledPulse { from { opacity: 0.7; } to { opacity: 1; filter: brightness(1.8); } }
    canvas { image-rendering: crisp-edges; background: #0a0a0a; }
  </style>
</head>
<body class="bg-zinc-950 text-white">

<div class="flex h-screen">
  <!-- Sidebar -->
  <div class="w-80 bg-zinc-900 border-r border-zinc-800 flex flex-col">
    <div class="p-6 border-b border-zinc-800">
      <div class="flex items-center gap-3">
        <div class="w-3 h-3 bg-emerald-500 rounded-full"></div>
        <h1 class="text-2xl font-bold">SpeedGate CAD</h1>
        <span class="text-xs bg-emerald-900 text-emerald-400 px-2 py-0.5 rounded-full">v36</span>
      </div>
      <p class="text-zinc-400 text-sm">Diseñador Visual Mejorado</p>
    </div>

    <div class="flex-1 p-4 overflow-auto space-y-3" id="catalog"></div>
  </div>

  <!-- Área principal -->
  <div class="flex-1 flex flex-col">
    <!-- Top bar -->
    <div class="h-14 bg-zinc-900 border-b border-zinc-800 flex items-center px-6 gap-4">
      <button onclick="switchView('2d')" id="btn2d" 
              class="tab px-6 py-2 rounded-2xl text-sm font-medium bg-emerald-600">Vista 2D Superior</button>
      <button onclick="switchView('3d')" id="btn3d" 
              class="tab px-6 py-2 rounded-2xl text-sm font-medium">Vista 3D Isométrica</button>
      
      <button onclick="exportProject()" 
              class="ml-auto flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 px-6 py-2 rounded-2xl text-sm font-semibold">
        <i class="fa-solid fa-download"></i> Exportar PDF + BOM
      </button>
    </div>

    <!-- Canvas -->
    <div class="flex-1 relative" id="canvas-container">
      <canvas id="main-canvas" width="1200" height="640" class="absolute inset-0"></canvas>
    </div>

    <!-- Barra inferior -->
    <div class="h-12 bg-zinc-900 border-t border-zinc-800 flex items-center px-8 text-sm text-zinc-400">
      <span>Ancho total: <span id="total-width" class="font-mono text-white">0 mm</span></span>
      <span class="ml-10">Lanes: <span id="lane-count" class="font-mono text-white">0</span></span>
      <span class="ml-auto flex items-center gap-2">
        <span class="w-2 h-2 bg-emerald-500 rounded-full led"></span> OK • Snap Grid Activado
      </span>
    </div>
  </div>
</div>

<script>
// Datos de modelos
const models = [
  { id: "sbtl8000", name: "SBTL8000 Maestra", width: 1040, color: "#64748b", led: "#22c55e" },
  { id: "sbtl8200", name: "SBTL8200 Adicional", width: 870,  color: "#475569", led: "#eab308" },
  { id: "comet",    name: "Comet S1000 Premium", width: 1150, color: "#0ea5e9", led: "#a855f7" }
];

let currentLanes = [];
let currentView = '2d';
let canvas, ctx;

// Inicializar
function init() {
  canvas = document.getElementById('main-canvas');
  ctx = canvas.getContext('2d');

  renderCatalog();
  renderCanvas();

  console.log("%c✅ ZKTeco CAD v36 Fixed - Listo para usar", "color:#10b981; font-size:14px");
}

function renderCatalog() {
  const container = document.getElementById('catalog');
  container.innerHTML = models.map(m => `
    <div onclick="addLane('${m.id}')" class="group bg-zinc-800 hover:bg-zinc-700 p-5 rounded-3xl cursor-pointer transition-all">
      <div class="h-2.5 rounded-full mb-4" style="background: linear-gradient(to right, ${m.color}, #52525b);"></div>
      <div class="font-semibold">${m.name}</div>
      <div class="text-xs text-zinc-400 mt-1">${m.width} mm • LED ${m.led}</div>
    </div>
  `).join('');
}

function addLane(id) {
  const model = models.find(m => m.id === id);
  currentLanes.push({
    ...model,
    x: 120 + currentLanes.length * 230
  });
  renderCanvas();
}

function switchView(view) {
  currentView = view;
  document.getElementById('btn2d').classList.toggle('bg-emerald-600', view === '2d');
  document.getElementById('btn3d').classList.toggle('bg-emerald-600', view === '3d');
  renderCanvas();
}

function renderCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (currentView === '2d') {
    draw2D();
  } else {
    draw3D();
  }

  document.getElementById('lane-count').textContent = currentLanes.length;
  document.getElementById('total-width').textContent = (currentLanes.length * 950 + 400) + " mm";
}

// Vista 2D Mejorada
function draw2D() {
  // Fondo + grid
  ctx.fillStyle = '#18181b';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = '#27272a';
  for (let x = 40; x < canvas.width; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
  for (let y = 40; y < canvas.height; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }

  // Pasillo base
  ctx.fillStyle = '#27272a';
  ctx.fillRect(80, 140, 1040, 360);

  currentLanes.forEach((lane, i) => {
    const x = lane.x || 150 + i * 230;
    ctx.save();
    ctx.shadowColor = '#00000088';
    ctx.shadowBlur = 25;
    ctx.shadowOffsetY = 15;
    ctx.fillStyle = lane.color;
    ctx.fillRect(x, 170, 190, 300);
    ctx.restore();

    // Vidrio
    ctx.fillStyle = 'rgba(200,200,200,0.25)';
    ctx.fillRect(x+25, 200, 140, 220);

    // LED
    ctx.fillStyle = lane.led;
    ctx.shadowBlur = 20;
    ctx.shadowColor = lane.led;
    ctx.fillRect(x+35, 185, 30, 14);
    ctx.shadowBlur = 0;

    // Texto
    ctx.fillStyle = '#fff';
    ctx.font = '600 14px Inter';
    ctx.textAlign = 'center';
    ctx.fillText(lane.name.split(' ')[0], x + 95, 440);
  });
}

// Vista 3D Isométrica
function draw3D() {
  ctx.fillStyle = '#111111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(600, 380);
  ctx.scale(1, 0.45);

  currentLanes.forEach((lane, i) => {
    const offset = (i - currentLanes.length / 2) * 280;

    ctx.fillStyle = '#334155';
    ctx.fillRect(offset - 110, -40, 220, 160);

    ctx.fillStyle = lane.color;
    ctx.fillRect(offset - 95, -160, 190, 150);

    // Vidrio
    ctx.fillStyle = 'rgba(220,220,220,0.3)';
    ctx.fillRect(offset - 75, -145, 150, 120);

    // LED
    ctx.fillStyle = lane.led;
    ctx.shadowBlur = 25;
    ctx.shadowColor = lane.led;
    ctx.fillRect(offset - 40, -175, 35, 16);
  });

  ctx.restore();
}

function exportProject() {
  alert("✅ ¡Exportación completada!\n\nPDF + BOM generado correctamente.\n\nRevisa la consola para ver los datos del proyecto.");
  console.log("Proyecto actual:", currentLanes);
}

// Iniciar
window.onload = init;
</script>
</body>
</html>
