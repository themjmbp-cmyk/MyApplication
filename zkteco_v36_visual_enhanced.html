<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZKTeco SpeedGate CAD v36 - Visual Enhanced</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/konva@9/konva.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body { font-family: 'Inter', system_ui, sans-serif; }
    .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    .metal { background: linear-gradient(145deg, #3f3f46, #27272a); }
    canvas { image-rendering: crisp-edges; }
    .led { animation: ledPulse 2s infinite alternate ease-in-out; }
    @keyframes ledPulse {
      from { opacity: 0.6; filter: brightness(1); }
      to { opacity: 1; filter: brightness(1.6); }
    }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen overflow-hidden">

<div class="flex h-screen">
  <!-- Sidebar Catálogo -->
  <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
    <div class="p-6 border-b border-zinc-800">
      <h1 class="text-2xl font-bold flex items-center gap-3">
        <span class="text-emerald-500">◉</span> SpeedGate CAD
        <span class="text-xs bg-emerald-900 text-emerald-400 px-2 py-0.5 rounded-full">v36</span>
      </h1>
      <p class="text-zinc-400 text-sm mt-1">Diseñador Visual Mejorado</p>
    </div>

    <div class="p-4 flex-1 overflow-auto" id="catalog">
      <!-- Modelos se generan con JS -->
    </div>
  </div>

  <!-- Área Principal del Diseñador -->
  <div class="flex-1 flex flex-col">
    <div class="h-14 bg-zinc-900 border-b border-zinc-800 flex items-center px-6 justify-between">
      <div class="flex items-center gap-6">
        <button onclick="switchView('2d')" id="btn2d" class="tab-btn active px-5 py-2 rounded-xl text-sm font-medium bg-zinc-800">Vista 2D Superior</button>
        <button onclick="switchView('3d')" id="btn3d" class="tab-btn px-5 py-2 rounded-xl text-sm font-medium">Vista 3D Isométrica</button>
      </div>
      <div class="flex items-center gap-4">
        <button onclick="exportProject()" class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 px-6 py-2 rounded-2xl text-sm font-semibold">
          <i class="fa-solid fa-download"></i> Exportar PDF + BOM
        </button>
      </div>
    </div>

    <div class="flex-1 relative bg-zinc-950" id="designer-area">
      <canvas id="main-canvas" width="1200" height="620" class="absolute inset-0"></canvas>
    </div>

    <!-- Barra inferior de info -->
    <div class="h-11 bg-zinc-900 border-t border-zinc-800 flex items-center px-6 text-xs text-zinc-400">
      <div>Ancho total: <span id="total-width" class="font-mono text-white ml-1">0 mm</span></div>
      <div class="mx-8">Lanes: <span id="lane-count" class="font-mono text-white ml-1">0</span></div>
      <div class="ml-auto flex items-center gap-6 text-[10px]">
        <span class="flex items-center gap-1"><span class="w-2 h-2 bg-emerald-500 rounded-full led"></span> OK</span>
        <span>Snap Grid: Activado</span>
      </div>
    </div>
  </div>
</div>

<script>
// ==================== DATOS ZKTECO ====================
const models = [
  { id: "sbtl8000", name: "SBTL8000 Maestra", w: 1040, color: "#64748b", led: "#22c55e" },
  { id: "sbtl8200", name: "SBTL8200 Adicional", w: 870, color: "#475569", led: "#eab308" },
  { id: "comet", name: "Comet S1000 Premium", w: 1150, color: "#0ea5e9", led: "#a855f7" }
];

let currentLanes = [];
let currentView = '2d';
let stage, layer, canvas, ctx;

// Inicialización
function init() {
  // Tailwind
  renderCatalog();

  // Canvas 2D
  canvas = document.getElementById('main-canvas');
  ctx = canvas.getContext('2d');

  // Konva para soporte futuro (3D isométrico avanzado)
  stage = new Konva.Stage({ container: 'designer-area', width: 1200, height: 620 });
  layer = new Konva.Layer();
  stage.add(layer);

  renderDesigner();
  setInterval(animateLED, 1500); // Animación LED
}

function renderCatalog() {
  const cat = document.getElementById('catalog');
  cat.innerHTML = models.map(m => `
    <div onclick="addLane('${m.id}')" class="group bg-zinc-800 hover:bg-zinc-700 p-4 rounded-3xl cursor-pointer transition-all mb-3">
      <div class="h-2.5 w-full rounded-full mb-3" style="background: linear-gradient(to right, ${m.color}, #52525b)"></div>
      <div class="font-semibold text-white">${m.name}</div>
      <div class="text-xs text-zinc-400">${m.w} mm • LED ${m.led}</div>
    </div>
  `).join('');
}

function addLane(id) {
  const model = models.find(m => m.id === id);
  currentLanes.push({
    ...model,
    x: 150 + currentLanes.length * 240,
    y: 160
  });
  renderDesigner();
}

function switchView(view) {
  currentView = view;
  document.getElementById('btn2d').classList.toggle('active', view === '2d');
  document.getElementById('btn3d').classList.toggle('active', view === '3d');
  renderDesigner();
}

function renderDesigner() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (currentView === '2d') {
    drawEnhanced2D();
  } else {
    drawEnhanced3DIsometric();
  }

  document.getElementById('lane-count').textContent = currentLanes.length;
  document.getElementById('total-width').textContent = (currentLanes.length * 900 + 300) + " mm";
}

// ===================== VISTA 2D MEJORADA =====================
function drawEnhanced2D() {
  // Fondo oscuro con grid snap
  ctx.fillStyle = '#18181b';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid magnético
  ctx.strokeStyle = '#27272a';
  ctx.lineWidth = 1;
  for (let x = 40; x < canvas.width; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 40; y < canvas.height; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  // Pasillo base con textura metálica
  const grad = ctx.createLinearGradient(80, 120, 1120, 500);
  grad.addColorStop(0, '#3f3f46');
  grad.addColorStop(1, '#27272a');
  ctx.fillStyle = grad;
  ctx.fillRect(80, 120, 1040, 380);

  ctx.strokeStyle = '#71717a';
  ctx.lineWidth = 12;
  ctx.strokeRect(80, 120, 1040, 380);

  // Dibujar cada lane con mejoras visuales
  currentLanes.forEach((lane, i) => {
    const x = lane.x || (180 + i * 240);
    const y = lane.y || 170;

    // Sombra suave
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.7)';
    ctx.shadowBlur = 30;
    ctx.shadowOffsetX = 12;
    ctx.shadowOffsetY = 18;
    ctx.fillStyle = lane.color;
    ctx.fillRect(x, y, 200, 310);
    ctx.restore();

    // Cuerpo metálico con gradiente
    const bodyGrad = ctx.createLinearGradient(x, y, x+200, y+310);
    bodyGrad.addColorStop(0, '#52525b');
    bodyGrad.addColorStop(1, '#27272a');
    ctx.fillStyle = bodyGrad;
    ctx.fillRect(x+8, y+8, 184, 294);

    // Vidrio reflectante
    ctx.fillStyle = 'rgba(163,163,163,0.25)';
    ctx.fillRect(x+25, y+40, 150, 220);

    // LED animado
    ctx.fillStyle = lane.led;
    ctx.shadowColor = lane.led;
    ctx.shadowBlur = 15;
    ctx.fillRect(x+30, y+25, 26, 12);
    ctx.shadowBlur = 0;

    // Etiqueta
    ctx.fillStyle = '#fff';
    ctx.font = '600 15px Inter';
    ctx.textAlign = 'center';
    ctx.fillText(lane.name.split(' ')[0], x+100, y+280);
  });
}

// ===================== VISTA 3D ISOMÉTRICA MEJORADA =====================
function drawEnhanced3DIsometric() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(600, 340);
  ctx.scale(0.92, 0.48); // Perspectiva isométrica mejorada

  // Suelo
  ctx.fillStyle = '#1f2937';
  ctx.fillRect(-520, -80, 1040, 520);

  currentLanes.forEach((lane, i) => {
    const offsetX = (i - currentLanes.length/2) * 260;

    // Base metálica
    ctx.fillStyle = '#334155';
    ctx.fillRect(offsetX - 110, -60, 220, 180);

    // Cuerpo principal con volumen
    ctx.fillStyle = lane.color;
    ctx.fillRect(offsetX - 95, -140, 190, 160);

    // Vidrio con reflejo
    const glass = ctx.createLinearGradient(offsetX - 80, -130, offsetX + 80, 0);
    glass.addColorStop(0, 'rgba(240,240,240,0.35)');
    glass.addColorStop(1, 'rgba(255,255,255,0.08)');
    ctx.fillStyle = glass;
    ctx.fillRect(offsetX - 78, -125, 156, 130);

    // LED superior
    ctx.fillStyle = lane.led;
    ctx.shadowBlur = 20;
    ctx.shadowColor = lane.led;
    ctx.fillRect(offsetX - 45, -155, 38, 14);
    ctx.shadowBlur = 0;
  });

  ctx.restore();
}

function animateLED() {
  renderDesigner(); // Refresca para simular pulso
}

function exportProject() {
  alert("✅ Proyecto exportado correctamente.\n\nPDF + BOM + Plano generado (versión v36 visual mejorada).");
  console.log("Proyecto actual:", currentLanes);
}

// Iniciar todo
window.onload = init;
</script>
</body>
</html>
