<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>ZKTeco CAD v32</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#1a2a3a}
:root{--d:#0d1f30;--nv:#14304f;--nv2:#1a3a5c;--ac:#7dd87a;--bl:#1a5fa0;--rd:#cc1111;--am:#c08800;--gn:#1a7a30;--t2:#a8bdd4;--br:rgba(255,255,255,.10);--hv:rgba(255,255,255,.07)}
#w{font-family:system-ui,sans-serif;width:100%;max-width:100%}
.tb{background:var(--d);padding:0 14px;display:flex;align-items:center;gap:12px;height:48px;border-bottom:2px solid var(--nv2);flex-wrap:wrap}
.logo{font-size:20px;font-weight:700;color:#fff;font-family:monospace;flex-shrink:0}.logo em{color:var(--ac);font-style:normal}
.vtag{background:var(--nv2);border:1px solid var(--br);color:var(--t2);font-size:9px;font-family:monospace;padding:2px 8px;border-radius:20px}
.lp{display:flex;gap:2px;background:var(--nv2);border-radius:20px;padding:2px;margin-left:auto}
.lb{padding:3px 10px;border:none;border-radius:16px;background:transparent;color:var(--t2);font-size:10px;font-family:monospace;font-weight:700;cursor:pointer;transition:all .15s}
.lb.on{background:var(--ac);color:#0d1f30}.lb:hover:not(.on){background:var(--hv);color:#fff}
.pt{background:var(--nv);display:flex;align-items:stretch;border-bottom:1px solid var(--br);padding:0 8px;gap:2px}
.ptb{display:flex;align-items:center;gap:6px;padding:10px 16px 8px;font-size:11px;font-weight:600;color:var(--t2);border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap;border-radius:6px 6px 0 0;margin-bottom:-1px}
.ptb:hover:not(.on){background:var(--hv);color:#fff}.ptb.on{color:var(--ac);border-bottom-color:var(--ac);background:rgba(125,216,122,.08)}
.xb{background:var(--d);border-bottom:1px solid var(--br);display:flex;align-items:center;gap:6px;padding:8px 14px;flex-wrap:wrap}
.xlbl{font-size:9px;font-family:monospace;color:var(--t2);letter-spacing:1px;text-transform:uppercase;flex-shrink:0}
.bf{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:6px;border:1.5px solid;font-size:10px;font-family:monospace;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.bsv{border-color:#2a7a50;color:#4acc80;background:rgba(42,122,80,.12)}.bsv:hover{background:rgba(42,122,80,.25)}
.bld{border-color:#6a3a9a;color:#b07fe0;background:rgba(106,58,154,.12)}.bld:hover{background:rgba(106,58,154,.25)}
.eg{display:flex;border-radius:6px;overflow:hidden;border:1.5px solid rgba(42,107,176,.5);margin-left:auto}
.be{display:flex;align-items:center;gap:4px;padding:6px 11px;border:none;border-right:1px solid rgba(42,107,176,.3);font-size:10px;font-family:monospace;font-weight:600;cursor:pointer;transition:all .15s;background:rgba(42,107,176,.1);color:#7ab8f0}
.be:last-child{border-right:none}.be:hover{background:rgba(42,107,176,.3);color:#c8e0ff}
.bpdf{background:rgba(139,0,0,.12);color:#f08080}.bpdf:hover{background:rgba(139,0,0,.28)}
.bpe{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:5px;border:1px solid rgba(255,255,255,.12);font-size:9px;font-family:monospace;cursor:pointer;transition:all .15s;background:transparent;color:var(--t2)}
.bpe:hover{background:var(--hv);color:#fff;border-color:rgba(255,255,255,.25)}.bpe:disabled{opacity:.35;cursor:default;pointer-events:none}
.ab{display:none;padding:8px 16px;font-family:monospace;font-size:9.5px;align-items:center;gap:10px;border-bottom:2px solid;flex-wrap:wrap}
.ab.on{display:flex}.ab.over{background:#2a0505;border-color:var(--rd);color:#ff9090}.ab.near{background:#2a1f00;border-color:var(--am);color:#f0c060}
.abody{flex:1;line-height:1.5}.abadge{padding:3px 10px;border-radius:20px;font-size:8px;font-weight:700;flex-shrink:0}
.ab.over .abadge{background:var(--rd);color:#fff}.ab.near .abadge{background:var(--am);color:#fff}
.pb{display:none;background:var(--nv2);padding:7px 16px;font-family:monospace;font-size:9px;color:#90d0ff;align-items:center;gap:10px}.pb.on{display:flex}
.pbf{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}.pbi{height:100%;background:var(--ac);border-radius:4px;transition:width .3s}
.mb{background:var(--d);border-bottom:1px solid var(--br);display:flex;overflow-x:auto;padding:0 8px;gap:2px}
.mbt{display:flex;flex-direction:column;gap:2px;padding:8px 14px;border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;flex-shrink:0;border-radius:6px 6px 0 0;margin-bottom:-1px}
.mbt:hover:not(.on){background:var(--hv)}.mbt.on{background:rgba(125,216,122,.08);border-bottom-color:var(--ac)}
.mn{font-size:10px;font-weight:600;font-family:monospace;color:var(--t2)}.mbt.on .mn{color:var(--ac)}
.ms{font-size:7.5px;color:rgba(168,189,212,.6);font-family:monospace}.mbt.on .ms{color:rgba(125,216,122,.6)}
.cb{background:var(--nv);display:flex;align-items:stretch;border-bottom:1px solid var(--br);flex-wrap:wrap}
.cg{padding:8px 14px;border-right:1px solid var(--br);display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.cg.str{flex:1;border-right:none;align-items:flex-end;justify-content:center;padding-right:16px}
.cl{font-size:8px;font-weight:600;color:var(--t2);letter-spacing:.12em;text-transform:uppercase;font-family:monospace}
.cr{display:flex;gap:4px;align-items:center}
.nb{width:26px;height:26px;border:1.5px solid rgba(255,255,255,.15);border-radius:6px;background:rgba(255,255,255,.05);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;font-family:monospace;user-select:none}
.nb:hover{background:rgba(255,255,255,.12)}.nb:disabled{opacity:.3;cursor:default;pointer-events:none}
.nv{font-size:22px;font-weight:700;font-family:monospace;min-width:28px;text-align:center;color:#fff}
.lf{width:84px;padding:5px 8px;border:1.5px solid rgba(255,255,255,.15);border-radius:6px;background:rgba(255,255,255,.05);color:#fff;font-family:monospace;font-size:12px;text-align:right}
.lf:focus{outline:none;border-color:var(--bl)}.lf.over{border-color:var(--rd);color:#ff9090}.lf.near{border-color:var(--am);color:#f0c060}
.lu{font-size:10px;color:var(--t2);font-family:monospace}
.sr{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.sc{display:flex;flex-direction:column;background:rgba(255,255,255,.05);border:1px solid var(--br);border-radius:8px;padding:4px 10px}
.sl{font-size:7.5px;color:var(--t2);font-family:monospace;letter-spacing:.3px}.sv{font-size:13px;font-weight:700;font-family:monospace;color:#fff}
.sv.over{color:#ff9090}.sv.near{color:#f0c060}
.lr{background:rgba(255,255,255,.02);border-bottom:1px solid var(--br);display:flex;overflow-x:auto;padding:4px 10px;gap:4px}
.lc{padding:4px 10px;border-right:1px solid var(--br);display:flex;flex-direction:column;gap:3px;flex-shrink:0}.lc:last-child{border-right:none}
.ln{font-size:8px;font-weight:600;color:var(--t2);letter-spacing:.1em;text-transform:uppercase;font-family:monospace}
.lch{display:flex;gap:3px;flex-wrap:wrap}
.ch{padding:2px 8px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04);cursor:pointer;font-size:9px;font-family:monospace;color:var(--t2);transition:all .1s;white-space:nowrap;line-height:1.5}
.ch.op{border-color:var(--bl);background:rgba(42,107,176,.2);color:#7ab8f0;font-weight:700}
.ch.ol{border-color:var(--gn);background:rgba(26,122,48,.2);color:var(--ac);font-weight:700}
.ch:hover:not(.op):not(.ol){background:var(--hv);color:#fff}

/* ── ACCESSORY SIDE CONFIG — green high-contrast ── */
.acbar{background:#152010;border-top:2px solid #2e5018;border-bottom:2px solid #2e5018}
.acbar-inner{display:grid;grid-template-columns:1fr 1fr;gap:0}
@media(max-width:700px){.acbar-inner{grid-template-columns:1fr}}
.ac-side{padding:8px 12px;border-right:1px solid rgba(125,216,122,.15)}
.ac-side:last-child{border-right:none}
.ac-side-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ac-side-lbl{font-size:8px;font-weight:700;color:#a8e080;letter-spacing:.15em;text-transform:uppercase;font-family:monospace}
.ac-dir{font-size:11px;color:#7dd87a;font-family:monospace;font-weight:900}
.ac-items{display:flex;flex-direction:column;gap:5px;min-height:28px}
.ac-item{display:flex;align-items:center;gap:6px;background:rgba(125,216,122,.09);border:1.5px solid rgba(125,216,122,.3);border-radius:7px;padding:5px 8px;flex-wrap:wrap}
.ac-item-badge{background:#3d7a20;color:#c8f090;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:800;font-family:monospace;flex-shrink:0;border:1px solid rgba(125,216,122,.4)}
.ac-item-desc{font-size:8.5px;color:#a8d888;font-family:monospace;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* R50 custom dim inputs */
.ac-r50-row{width:100%;display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px;padding-top:4px;border-top:1px solid rgba(125,216,122,.15)}
.ac-r50-lbl{font-size:8px;color:#90c860;font-family:monospace;white-space:nowrap;font-weight:600}
.ac-r50-inp{width:68px;padding:3px 6px;border-radius:5px;border:1.5px solid rgba(125,216,122,.4);background:rgba(0,0,0,.35);color:#d8f4b8;font-family:monospace;font-size:11px;font-weight:700;text-align:right}
.ac-r50-inp:focus{outline:none;border-color:#7dd87a;background:rgba(0,0,0,.5)}
.ac-r50-unit{font-size:8px;color:#6aaa40;font-family:monospace}
.ac-r50-range{font-size:7px;color:rgba(125,216,122,.45);font-family:monospace;white-space:nowrap}
.ac-rm{background:rgba(255,70,70,.15);border:1.5px solid rgba(255,70,70,.4);border-radius:5px;color:#ff9090;font-size:14px;cursor:pointer;padding:0 7px;flex-shrink:0;transition:all .12s;line-height:1.8}
.ac-rm:hover{background:rgba(255,70,70,.4);color:#fff;border-color:#ff4040}
.ac-add-row{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;align-items:center}
.ac-add-lbl{font-size:8px;color:#7dd87a;font-family:monospace;text-transform:uppercase;letter-spacing:.8px;margin-right:2px;font-weight:600}
.ac-add-btn{padding:4px 12px;border-radius:20px;border:2px solid rgba(125,216,122,.55);background:rgba(125,216,122,.1);cursor:pointer;font-size:10px;font-family:monospace;font-weight:700;color:#a8e880;transition:all .12s;white-space:nowrap}
.ac-add-btn:hover{background:rgba(125,216,122,.28);color:#d0ffb0;border-color:#7dd87a;box-shadow:0 0 8px rgba(125,216,122,.2)}
.ac-add-btn:disabled{opacity:.22;cursor:default;pointer-events:none}
.ac-none{font-size:8px;color:rgba(125,216,122,.35);font-family:monospace;font-style:italic;padding:2px 0}

.dw{background:#eeede5;line-height:0;width:100%}.dw svg{display:block;width:100%;height:auto}
.cvw{background:var(--d);padding:16px;display:flex;gap:14px;flex-wrap:wrap}
.cvc{flex:1;min-width:210px;display:flex;flex-direction:column;gap:10px}
.fr{display:flex;flex-direction:column;gap:4px}
.fr label{font-size:8px;font-weight:600;color:var(--t2);letter-spacing:.12em;text-transform:uppercase;font-family:monospace}
.fr input{padding:6px 10px;border:1.5px solid rgba(255,255,255,.12);border-radius:6px;background:rgba(255,255,255,.06);color:#fff;font-family:monospace;font-size:11px;width:100%}
.fr input:focus{outline:none;border-color:var(--bl)}
.whb{background:var(--d);padding:8px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--br);flex-wrap:wrap}
/* ficha */
#pf{background:#f8f8f6}
.fo{padding:12px 16px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;font-family:monospace}
@media(max-width:640px){.fg{grid-column:1fr}}
.fc{border:1px solid #c8d4e8;border-radius:6px;overflow:hidden}
.fh{padding:7px 12px;font-size:10px;font-weight:bold;letter-spacing:1px}
.fhd{background:#14304f;color:#7dd87a}.fhg{background:#1a4a28;color:#7dd87a}.fhb{background:#0a2a50;color:#7dd87a}.fhr{background:#5a1010;color:#ffaaaa}.fha{background:#3a2400;color:#f0c060}
.fr2{display:flex;justify-content:space-between;align-items:baseline;padding:5px 12px;border-bottom:.5px solid #e0e8f0;gap:8px}.fr2:last-child{border-bottom:none}
.fk{font-size:9px;color:#666;white-space:nowrap}.fv{font-size:10.5px;font-weight:600;color:#111;text-align:right}
.fv .u{font-size:8px;font-weight:400;color:#888;margin-left:3px}
.fkpi{background:#dceefb;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #c8d4e8}
.fkl{font-size:9px;font-weight:700;color:#0a3070;letter-spacing:.5px}.fkv{font-size:20px;font-weight:900;color:#0a3070;font-family:monospace}
.fhr2{background:#14304f;color:#7dd87a;text-align:center;padding:10px 16px;font-size:14px;font-weight:bold;letter-spacing:1px;border-radius:6px 6px 0 0;margin-bottom:12px;grid-column:1/-1}
.flg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;padding:8px 12px;background:#f8f8f6}
.fli{border:.5px solid #ddd;border-radius:4px;padding:6px 8px;background:#f2f2f0}
.flinum{font-size:7px;color:#888;letter-spacing:.5px;text-transform:uppercase}
.flipass{font-size:11px;font-weight:700;color:#2a7a2a;font-family:monospace}.flileaf{font-size:8.5px;color:#333;font-weight:600;margin-top:2px}
.fligmp{font-size:7px;color:#888;margin-top:1px}.flidims{font-size:6.5px;color:#aaa}
.pvcc{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:800;font-family:monospace;margin:6px 12px}
.bpr{display:flex;gap:4px;padding:5px 12px;flex-wrap:wrap;border-bottom:.5px solid #e0e8f0}
.bp{background:#cc1111;color:#fff;border-radius:3px;padding:1px 5px;font-size:8px;font-family:monospace;font-weight:600}
.fft{background:#14304f;color:#7dd87a;text-align:center;padding:7px;font-size:7.5px;letter-spacing:.8px;border-radius:0 0 6px 6px;grid-column:1/-1}
/* acc ficha */
.afc{grid-column:1/-1;border:1.5px solid rgba(200,136,0,.4);border-radius:6px;overflow:hidden}
.afh{background:#3a2400;color:#f0c060;padding:7px 12px;font-size:10px;font-weight:bold;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.afbadge{background:#c08800;color:#fff;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:800;font-family:monospace}
.afsides{display:grid;grid-template-columns:1fr 1fr;gap:0;background:#f8f8f6}
.afside{padding:8px 12px;border-right:.5px solid rgba(200,136,0,.2)}.afside:last-child{border-right:none}
.afside-lbl{font-size:8px;font-weight:700;color:rgba(200,136,0,.8);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;font-family:monospace}
.adr{display:flex;justify-content:space-between;padding:3px 0;border-bottom:.5px solid rgba(200,136,0,.1);gap:8px}.adr:last-child{border-bottom:none}
.adk{font-size:8.5px;color:#666}.adv{font-size:10px;font-weight:700;color:#c08800;font-family:monospace}
.ac-none-note{font-size:8px;color:#aaa;font-style:italic;padding:4px 0}
</style>
</head>
<body>
<div id="w">
<div class="tb">
  <span class="logo"><em>ZK</em>Teco</span><span class="vtag">SpeedGate CAD v32</span>
  <div class="lp">
    <button class="lb on" data-lang="es" onclick="setLang('es')">ES</button>
    <button class="lb" data-lang="en" onclick="setLang('en')">EN</button>
    <button class="lb" data-lang="pt" onclick="setLang('pt')">PT</button>
  </div>
</div>
<div class="pt">
  <button class="ptb on" id="tab-cad" onclick="setPage('cad')">📐 <span data-t="tabCad">Plano CAD</span></button>
  <button class="ptb" id="tab-wiring" onclick="setPage('wiring')">🔌 <span data-t="tabWiring">Cableado</span></button>
  <button class="ptb" id="tab-ficha" onclick="setPage('ficha')">📋 <span data-t="tabFicha">Ficha técnica</span></button>
  <button class="ptb" id="tab-cover" onclick="setPage('cover')">📄 <span data-t="tabCover">Portada</span></button>
</div>
<div class="xb">
  <span class="xlbl" data-t="expProject">Proyecto</span>
  <button class="bf bsv" onclick="saveProject()">💾 <span data-t="btnSave">Guardar</span></button>
  <button class="bf bld" onclick="document.getElementById('fi-load').click()">📂 <span data-t="btnLoad">Cargar</span></button>
  <input type="file" id="fi-load" accept=".json" style="display:none" onchange="loadProject(event)">
  <div class="eg">
    <button class="be" onclick="exportProject('png')" id="btn-all-png">⬇ PNG</button>
    <button class="be" onclick="exportProject('svg')" id="btn-all-svg">⬇ SVG</button>
    <button class="be bpdf" onclick="exportPDF()" id="btn-pdf">⬇ PDF A3</button>
  </div>
</div>
<div class="pb" id="pbar"><span id="pbar-txt">…</span><div class="pbf"><div class="pbi" id="pbar-inner" style="width:0%"></div></div><span id="pbar-pct" style="font-family:monospace;font-size:9px;color:#7dd87a">0%</span></div>
<div class="ab" id="alert-bar"><span style="font-size:16px;flex-shrink:0">⚠</span><span class="abody" id="alert-body"></span><span class="abadge" id="alert-badge"></span></div>

<div id="page-cad">
  <div class="mb" id="mtabs"></div>
  <div class="cb">
    <div class="cg"><div class="cl" id="lbl-lanes">Nº Pasillos</div>
      <div class="cr"><button class="nb" id="dm">−</button><div class="nv" id="nv">2</div><button class="nb" id="ip">+</button></div></div>
    <div class="cg"><div class="cl" id="lbl-limit">Hueco disponible obra</div>
      <div class="cr"><input class="lf" id="limit-input" type="number" min="0" step="10" placeholder="∞" oninput="onLimitChange()"><span class="lu">mm</span></div></div>
    <div class="cg"><div class="cl" id="lbl-page">Esta página</div>
      <div class="cr" style="gap:6px"><button class="bpe" onclick="exportPage('cv','svg')">SVG</button><button class="bpe" onclick="exportPage('cv','png')">PNG</button></div></div>
    <div class="cg str"><div class="sr" id="sk"></div></div>
  </div>
  <div class="lr" id="lr"></div>
  <!-- Accessories side configurator -->
  <div class="acbar">
    <div class="acbar-inner">
      <div class="ac-side" id="acc-left-panel">
        <div class="ac-side-hdr">
          <span class="ac-dir">◀</span>
          <span class="ac-side-lbl" data-t="accLeftSide">Lado izquierdo</span>
        </div>
        <div class="ac-items" id="acc-left-items"></div>
        <div class="ac-add-row" id="acc-left-add"></div>
      </div>
      <div class="ac-side" id="acc-right-panel">
        <div class="ac-side-hdr">
          <span class="ac-side-lbl" data-t="accRightSide">Lado derecho</span>
          <span class="ac-dir">▶</span>
        </div>
        <div class="ac-items" id="acc-right-items"></div>
        <div class="ac-add-row" id="acc-right-add"></div>
      </div>
    </div>
  </div>
  <div class="dw"><svg id="cv" viewBox="0 0 720 700"></svg></div>
</div>

<div id="page-wiring" style="display:none">
  <div class="whb"><div style="font-size:11px;font-weight:600;color:#fff;font-family:monospace" id="w-title">—</div><div id="pvc-badge"></div><div style="margin-left:auto;display:flex;gap:6px"><button class="bpe" onclick="exportPage('wsvg','svg')">SVG</button><button class="bpe" onclick="exportPage('wsvg','png')">PNG</button></div></div>
  <div class="dw"><svg id="wsvg" viewBox="0 0 720 400"></svg></div>
</div>

<div id="page-ficha" style="display:none">
  <div class="whb"><span style="font-size:10px;font-weight:600;color:#fff;font-family:monospace" data-t="tabFicha">Ficha técnica</span><div style="margin-left:auto;display:flex;gap:6px"><button class="bpe" onclick="exportFicha('svg')">SVG</button><button class="bpe" onclick="exportFicha('png')">PNG</button></div></div>
  <div id="pf"><div class="fo" id="ficha-outer"></div></div>
  <div style="position:absolute;left:-9999px"><svg id="ficha-svg" viewBox="0 0 680 800"></svg></div>
</div>

<div id="page-cover" style="display:none">
  <div class="cvw">
    <div class="cvc">
