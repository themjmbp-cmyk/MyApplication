const ACC_BY_CODE=Object.fromEntries(ACC_CAT.map(a=>[a.code,a]));

// State: each side is an array of {code, r50gi, r50gW, r50gH}
// r50gW/r50gH: custom glass dims for R50 (default 920×600)
let accLeft=[], accRight=[];

function getAccGlass(item){
  const a=ACC_BY_CODE[item.code];
  if(!a||!a.hasGlass)return null;
  if(a.customGlass){
    // R50: custom glass dimensions stored in item
    const gW=Math.max(a.gWmin,Math.min(a.gWmax,+(item.r50gW)||a.gW));
    const gH=Math.max(a.gHmin,Math.min(a.gHmax,+(item.r50gH)||a.gH));
    return{gW,gH,custom:true};
  }
  if(a.glassOpts)return a.glassOpts[Math.min(item.r50gi||0,a.glassOpts.length-1)];
  return{gW:a.gW,gH:a.gH};
}
function setR50Custom(side,idx,field,val){
  const list=side==='left'?accLeft:accRight;
  if(!list[idx])return;
  list[idx][field]=val;
  renderAccBar();drawCAD();if(PAGE==='ficha')drawFicha();autoSave();
}
function setAccIsoPos(side,idx,pos){
  const list=side==='left'?accLeft:accRight;
  if(list[idx])list[idx].isoZ=pos;
  renderAccBar();if(PAGE==='iso')drawISO();autoSave();
}
// R50 total width = glass width + 100mm (50mm post on each side)
// All other accessories have fixed W from catalog
function getAccItemW(item){
  const a=ACC_BY_CODE[item.code];if(!a)return 0;
  if(a.customGlass){return(+(item.r50gW)||a.gW)+100;}
  return a.W;
}
const ACC_GAP_MM=20;
// Total width of one side: gap-before-first + sum(widths) + gaps-between
function accSideTotalW(list){if(list.length===0)return 0;return list.length*ACC_GAP_MM+list.reduce((s,it)=>s+getAccItemW(it),0);}
function accTotalW(list){return accSideTotalW(list);}
function accLbl(a){return LANG==='en'?a.labelEn:LANG==='pt'?a.labelPt:a.label;}
function accDsc(a){return LANG==='en'?a.descEn:LANG==='pt'?a.descPt:a.desc;}
function goLbl(o){return LANG==='en'?o.labelEn:LANG==='pt'?o.labelPt:o.label;}

// ══ ACCESSORY UI ══════════════════════════════════════════════
function renderAccBar(){
  renderAccSide('left',accLeft,'acc-left-items','acc-left-add');
  renderAccSide('right',accRight,'acc-right-items','acc-right-add');
}
function renderAccSide(side,list,itemsId,addId){
  const itemsEl=document.getElementById(itemsId);
  const addEl=document.getElementById(addId);
  if(!itemsEl||!addEl)return;
  if(list.length===0){itemsEl.innerHTML=`<div class="ac-none">${T('accNone')}</div>`;}
  else{
    itemsEl.innerHTML=list.map((item,idx)=>{
      const a=ACC_BY_CODE[item.code];if(!a)return'';
      const gO=getAccGlass(item);
      let extraHtml='';
      if(a.customGlass){
        // R50: show custom numeric inputs for glass width and height
        const gW=+(item.r50gW)||920, gH=+(item.r50gH)||600;
        extraHtml=`<div class="ac-r50-row">
          <span class="ac-r50-lbl">${T('glass')}:</span>
          <span class="ac-r50-lbl">${T('r50Width')}</span>
          <input class="ac-r50-inp" type="number" min="${a.gWmin}" max="${a.gWmax}" step="10" value="${gW}"
            onchange="setR50Custom('${side}',${idx},'r50gW',Math.max(${a.gWmin},Math.min(${a.gWmax},+this.value)))">
          <span class="ac-r50-unit">mm</span>
          <span class="ac-r50-range">(${a.gWmin}–${a.gWmax})</span>
          <span class="ac-r50-lbl" style="margin-left:4px">${T('r50Height')}</span>
          <input class="ac-r50-inp" type="number" min="${a.gHmin}" max="${a.gHmax}" step="10" value="${gH}"
            onchange="setR50Custom('${side}',${idx},'r50gH',Math.max(${a.gHmin},Math.min(${a.gHmax},+this.value)))">
          <span class="ac-r50-unit">mm</span>
          <span class="ac-r50-range">(${a.gHmin}–${a.gHmax})</span>
        </div>`;
      }
      const dynW=getAccItemW(item);
      const dimDesc=`${dynW}×${a.H}mm${gO?` · ${T('glass')} ${gO.gW}×${gO.gH}mm`:''}`;
      const isoZ=+(item.isoZ)||1;
      const posHtml=`<div class="iso-pos-row"><span class="iso-pos-lbl">${T('isoPos')}:</span>${[0,1,2].map(p=>`<button class="iso-pos-btn${isoZ===p?' on':''}" onclick="setAccIsoPos('${side}',${idx},${p})">${[T('isoPosF'),T('isoPosM'),T('isoPosB')][p]}</button>`).join('')}</div>`;
      return`<div class="ac-item">
        <span class="ac-item-badge">${a.code}</span>
        <span class="ac-item-desc">${accDsc(a)} · ${dimDesc}</span>
        <button class="ac-rm" onclick="removeAcc('${side}',${idx})" title="${T('accRemove')}">×</button>
        ${extraHtml}${posHtml}
      </div>`;
    }).join('');
  }
  const canAdd=list.length<MAX_ACC_PER_SIDE;
  const maxMsg=!canAdd?`<span style="font-size:9px;color:rgba(125,216,122,.4);font-family:monospace;margin-left:4px">max ${MAX_ACC_PER_SIDE}</span>`:'';
  addEl.innerHTML=`<span class="ac-add-lbl">${T('accAdd')}:</span>`+
    ACC_CAT.map(a=>`<button class="ac-add-btn" ${canAdd?'':'disabled'} onclick="addAcc('${side}','${a.code}')" title="${canAdd?a.code+' · '+accDsc(a)+' · '+a.W+'×'+a.H+'mm':'Max '+MAX_ACC_PER_SIDE+' '+T('msgPerSide')}">${a.code}</button>`).join('')+maxMsg;
}
function addAcc(side,code){
  const a=ACC_BY_CODE[code];if(!a)return;
  const list=side==='left'?accLeft:accRight;
  if(list.length>=MAX_ACC_PER_SIDE)return;
  if(typeof pushUndo==='function')pushUndo('+'+code);
  list.push({code,r50gi:0,r50gW:920,r50gH:600,isoZ:1});
  renderAccBar();drawCAD();if(PAGE==='ficha')drawFicha();if(PAGE==='cover')drawCover();autoSave();
}

// ══ AUTO-SAVE (LocalStorage) ══════════════════════════════════
const LS_KEY='zkteco-cad-v35';
let sessionRestored=false;
function autoSave(){
  try{
    const gv=id=>{const el=document.getElementById(id);return el?el.value:'';};
    localStorage.setItem(LS_KEY,JSON.stringify({version:'3',ts:Date.now(),model:M,lanes:lanes.map(l=>({pgIdx:l.pgIdx,lfIdx:l.lfIdx})),siteLimit,siteLen,accLeft,accRight,cover:{client:gv('f-client'),project:gv('f-project'),addr:gv('f-addr'),ref:gv('f-ref'),author:gv('f-author'),revby:gv('f-rev'),date:gv('f-date'),version:gv('f-version')}}));
  }catch(e){console.warn('autoSave failed:',e);const b=document.getElementById('btn-save-badge');if(b){b.title=e.message;b.style.opacity='1';}}}
function autoLoad(){
  try{
    const raw=localStorage.getItem(LS_KEY);if(!raw)return false;
    const d=JSON.parse(raw);
    if(d.model&&MODELS[d.model])M=d.model;
    if(Array.isArray(d.lanes))lanes=d.lanes.map(l=>({pgIdx:+(l.pgIdx)||0,lfIdx:+(l.lfIdx)||0}));
    if(lanes.length<1)lanes=[{pgIdx:0,lfIdx:0}];
    if(typeof d.siteLimit==='number'){siteLimit=d.siteLimit;const li=document.getElementById('limit-input');if(li)li.value=siteLimit||'';}
    if(typeof d.siteLen==='number'){siteLen=d.siteLen;const sl=document.getElementById('site-len');if(sl)sl.value=siteLen||'';}
    accLeft=Array.isArray(d.accLeft)?d.accLeft.filter(a=>ACC_BY_CODE[a.code]).map(a=>({...a,r50gW:+(a.r50gW)||920,r50gH:+(a.r50gH)||600,isoZ:+(a.isoZ)||1})):[];
    accRight=Array.isArray(d.accRight)?d.accRight.filter(a=>ACC_BY_CODE[a.code]).map(a=>({...a,r50gW:+(a.r50gW)||920,r50gH:+(a.r50gH)||600,isoZ:+(a.isoZ)||1})):[];
    if(d.cover){const c=d.cover;[['f-client',c.client],['f-project',c.project],['f-addr',c.addr],['f-ref',c.ref],['f-author',c.author],['f-rev',c.revby],['f-date',c.date],['f-version',c.version]].forEach(([id,v])=>{const el=document.getElementById(id);if(el&&v!=null)el.value=v;});}
    sessionRestored=true;return true;
  }catch(e){return false;}
}
function clearSession(){localStorage.removeItem(LS_KEY);sessionRestored=false;location.reload();}

function loadProject(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.model&&MODELS[d.model])M=d.model;
      if(Array.isArray(d.lanes)){const sp2=MODELS[M];lanes=d.lanes.map(l=>{const pg=+(l.pgIdx)||0,lf=+(l.lfIdx)||0;const maxPg=sp2.pg.length-1,pgC=Math.min(pg,maxPg),maxLf=sp2.pg[pgC].leaves.length-1;return{pgIdx:pgC,lfIdx:Math.min(lf,maxLf)};});}
      if(lanes.length<1)lanes=[{pgIdx:0,lfIdx:0}];
      if(typeof d.siteLimit==='number'){siteLimit=d.siteLimit;const li=document.getElementById('limit-input');if(li)li.value=siteLimit||'';}
      if(typeof d.siteLen==='number'){siteLen=d.siteLen;const sl=document.getElementById('site-len');if(sl)sl.value=siteLen||'';}
      accLeft=Array.isArray(d.accLeft)?d.accLeft.filter(a=>ACC_BY_CODE[a.code]).map(a=>({...a,r50gW:+(a.r50gW)||920,r50gH:+(a.r50gH)||600,isoZ:+(a.isoZ)||1})):[];
      accRight=Array.isArray(d.accRight)?d.accRight.filter(a=>ACC_BY_CODE[a.code]).map(a=>({...a,r50gW:+(a.r50gW)||920,r50gH:+(a.r50gH)||600,isoZ:+(a.isoZ)||1})):[];
      if(d.cover){const c=d.cover;[['f-client',c.client],['f-project',c.project],['f-addr',c.addr],['f-ref',c.ref],['f-author',c.author],['f-rev',c.revby],['f-date',c.date],['f-version',c.version]].forEach(([id,v])=>{const el=document.getElementById(id);if(el&&v!=null)el.value=v;});}
      ui();redrawPage();autoSave();
    }catch(err){alert(T('errorLoad')+': '+err.message);}
    e.target.value='';
  };reader.readAsText(file);
}

  for(let i=0;i<N();i++){const x0=cx[i],x1=cx[i+1];if(x0<L||x1>R||x1-x0<6)continue;const sw=x1-x0,rad=Math.min(8,r(sw*.10)),dY=r(fgy+SLAB+3);const path=`M${x0},${dY} L${x0},${r(BY-rad)} Q${x0},${BY} ${r(x0+rad)},${BY} L${r(x1-rad)},${BY} Q${x1},${BY} ${x1},${r(BY-rad)} L${x1},${dY}`;h+=`<path d="${path}" fill="none" stroke="${pvc.color}25" stroke-width="${pvcPx+5}" stroke-linecap="round" stroke-linejoin="round"/>`;h+=`<path d="${path}" fill="none" stroke="${pvc.color}" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>`;h+=`<path d="${path}" fill="none" stroke="rgba(255,255,255,.22)" stroke-width="${Math.max(2,pvcPx-3)}" stroke-linecap="round" stroke-linejoin="round"/>`;['#cc1111','#1a5fa0','#e8a020','#2a7a2a'].forEach((cc,k)=>{const ox=r(-co*.75+k*(co*1.5/3));h+=`<line x1="${r(x0+ox)}" y1="${dY}" x2="${r(x0+ox)}" y2="${r(BY-rad-2)}" stroke="${cc}" stroke-width=".9" opacity=".88"/>`;h+=`<line x1="${r(x1+ox)}" y1="${dY}" x2="${r(x1+ox)}" y2="${r(BY-rad-2)}" stroke="${cc}" stroke-width=".9" opacity=".88"/>`;if(sw>22)h+=`<line x1="${r(x0+rad+2)}" y1="${r(BY-1.5+(k-1.5)*1.4)}" x2="${r(x1-rad-2)}" y2="${r(BY-1.5+(k-1.5)*1.4)}" stroke="${cc}" stroke-width=".9" opacity=".88"/>`;});if(sw>36)h+=`<text x="${r((x0+x1)/2)}" y="${r(BY-pvcPx/2-3)}" text-anchor="middle" ${FM} font-size="5.5" fill="${pvc.color}" font-weight="bold">C${i+1}</text>`;}

// ── Accessory drawing helpers ─────────────────────────────────
// Draw accessories in PLAN VIEW (top view) — to the left or right of the gate footprint
// pox = gate left edge, poy = gate top, pdd = gate depth pixels, psc = scale
// Returns {svg, totalW_px}
// ── Draw ONE accessory unit in PLAN VIEW (top view) ──────────
// x0 = left pixel edge, poy = plan top, pdd = gate depth px, psc = scale
function drawAccPlanUnit(item,x0,poy,pdd,psc){
  const a=ACC_BY_CODE[item.code];if(!a)return'';
  let h='';
  const itemW=getAccItemW(item);   // ✅ dynamic width (R50 uses glass+100mm)
  const wPx=r(itemW*psc);
  const postWmm=a.code==='R50'?25:38;
  const postPx=Math.max(3,r(postWmm*psc));
  const planDepthMm=postWmm+30;
  const dPx=Math.max(6,Math.min(r(planDepthMm*psc),r(pdd*0.25)));
  const y0=r(poy+pdd/2-dPx/2);
  // Outer rectangle (footprint)
  const fill=a.hasGlass?'rgba(155,210,248,.18)':'rgba(200,136,0,.07)';
  h+=`<rect x="${x0}" y="${y0}" width="${wPx}" height="${dPx}" fill="${fill}" stroke="#c08800" stroke-width="1.1" rx="2"/>`;
  // Posts (small filled squares at each end)
  h+=`<rect x="${x0}" y="${y0}" width="${postPx}" height="${dPx}" fill="rgba(145,140,128,.65)" stroke="#88877a" stroke-width=".5" rx="1"/>`;
  h+=`<rect x="${r(x0+wPx-postPx)}" y="${y0}" width="${postPx}" height="${dPx}" fill="rgba(145,140,128,.65)" stroke="#88877a" stroke-width=".5" rx="1"/>`;
  // Glass edge line (R30/R40/R50)
  if(a.hasGlass){const gO=getAccGlass(item);if(gO){const gWpx=Math.min(r(gO.gW*psc),wPx-postPx*2);const gx=r(x0+(wPx-gWpx)/2);h+=`<line x1="${gx}" y1="${r(y0+dPx/2)}" x2="${r(gx+gWpx)}" y2="${r(y0+dPx/2)}" stroke="#5ab0d8" stroke-width="1.8" opacity=".75"/>`;}}
  // Label
  if(wPx>20)h+=`<text x="${r(x0+wPx/2)}" y="${r(y0-5)}" text-anchor="middle" ${FM} font-size="6" fill="#c08800" font-weight="700">${a.code}</text>`;
  return h;
}

// ── Draw ONE accessory unit in FRONT ELEVATION (dynamic width, supports R50) ──
function drawAccElevUnitDyn(item,x0,fgy,fsc){
  const a=ACC_BY_CODE[item.code];if(!a)return'';
  const itemW=getAccItemW(item);  // ✅ dynamic width for R50
  const origW=a.W;
  // Temporarily patch dimensions for drawing by overriding wPx via a proxy-item
  // We do this by building inline with itemW
  let h='';
  const wPx=r(itemW*fsc);
  const totalH=r(a.H*fsc);
  const y0=r(fgy-totalH);
  const postWmm=a.code==='R50'?25:38;
  const postWpx=Math.max(3,r(postWmm*fsc));
  const postRad=Math.max(1,r(postWmm*fsc*0.28));
  const railHmm=32;
  const railHpx=Math.max(2,r(railHmm*fsc));
  const baseWmm=postWmm+32;
  const baseHmm=14;
  const baseHpx=Math.max(2,r(baseHmm*fsc));
  const baseWpx=Math.max(postWpx+3,r(baseWmm*fsc));
  const postCol='#a8a89e',postStroke='#6a6a62',railCol='#b8b8ae';
  h+=`<rect x="${x0}" y="${r(y0+railHpx)}" width="${postWpx}" height="${r(totalH-railHpx-baseHpx)}" fill="${postCol}" stroke="${postStroke}" stroke-width=".6" rx="${postRad}"/>`;
  h+=`<rect x="${r(x0+wPx-postWpx)}" y="${r(y0+railHpx)}" width="${postWpx}" height="${r(totalH-railHpx-baseHpx)}" fill="${postCol}" stroke="${postStroke}" stroke-width=".6" rx="${postRad}"/>`;
  h+=`<rect x="${x0}" y="${y0}" width="${wPx}" height="${railHpx}" fill="${railCol}" stroke="${postStroke}" stroke-width=".7" rx="${Math.max(1,r(railHmm*fsc*0.3))}"/>`;
  if(railHpx>3)h+=`<rect x="${r(x0+2)}" y="${r(y0+1)}" width="${r(wPx-4)}" height="${r(railHpx*0.35)}" fill="rgba(255,255,255,.2)" rx="1"/>`;
  const lbX=r(x0+postWpx/2-baseWpx/2);
  h+=`<rect x="${lbX}" y="${r(fgy-baseHpx)}" width="${baseWpx}" height="${baseHpx}" fill="${postCol}" stroke="${postStroke}" stroke-width=".5" rx="1"/>`;
  const rbX=r(x0+wPx-postWpx/2-baseWpx/2);
  h+=`<rect x="${rbX}" y="${r(fgy-baseHpx)}" width="${baseWpx}" height="${baseHpx}" fill="${postCol}" stroke="${postStroke}" stroke-width=".5" rx="1"/>`;
  if(!a.hasGlass){
    const midBarY=r(y0+totalH*0.48);const midBarH=Math.max(2,r(14*fsc));
    h+=`<rect x="${x0}" y="${r(midBarY-midBarH/2)}" width="${wPx}" height="${midBarH}" fill="${railCol}" stroke="${postStroke}" stroke-width=".45" rx="1"/>`;
    if(wPx>18){
      const bTopY=r(y0+railHpx+4);const bBotY=r(midBarY+midBarH/2);const midX=r(x0+wPx/2);
      h+=`<line x1="${r(x0+postWpx+1)}" y1="${bTopY}" x2="${midX}" y2="${bBotY}" stroke="${postStroke}" stroke-width=".8" opacity=".55"/>`;
      h+=`<line x1="${r(x0+wPx-postWpx-1)}" y1="${bTopY}" x2="${midX}" y2="${bBotY}" stroke="${postStroke}" stroke-width=".8" opacity=".55"/>`;
      const lMidY=r((midBarY+fgy-baseHpx)*0.5);
      h+=`<line x1="${r(x0+postWpx+1)}" y1="${r(midBarY+midBarH/2)}" x2="${r(x0+wPx/2)}" y2="${lMidY}" stroke="${postStroke}" stroke-width=".5" opacity=".35"/>`;
      h+=`<line x1="${r(x0+wPx-postWpx-1)}" y1="${r(midBarY+midBarH/2)}" x2="${r(x0+wPx/2)}" y2="${lMidY}" stroke="${postStroke}" stroke-width=".5" opacity=".35"/>`;
    }
  } else {
    const gO=getAccGlass(item);
    if(gO){
      const glassBottomMm=120;
      // For R50 the glass can be as wide as itemW - posts, for others clamp to wPx
      const gWpx=a.code==='R50'?r(gO.gW*fsc):Math.min(r(gO.gW*fsc),wPx-postWpx*1.2);
      const gHpx=r(gO.gH*fsc);
      const gBotPx=r(glassBottomMm*fsc);
      const gx=r(x0+(wPx-gWpx)/2);
      const gy=r(fgy-gBotPx-gHpx);
      h+=`<rect x="${gx}" y="${gy}" width="${gWpx}" height="${gHpx}" fill="rgba(155,210,245,.52)" stroke="#48a8d0" stroke-width=".9" rx="1"/>`;
      if(gWpx>10)h+=`<rect x="${r(gx+2)}" y="${r(gy+2)}" width="${r(Math.max(3,gWpx*0.10))}" height="${r(gHpx*0.72)}" fill="rgba(255,255,255,.22)" rx=".5"/>`;
      if(gHpx>20)h+=`<line x1="${r(gx+3)}" y1="${r(gy+gHpx*0.5)}" x2="${r(gx+gWpx-3)}" y2="${r(gy+gHpx*0.5)}" stroke="rgba(255,255,255,.18)" stroke-width=".8"/>`;
      const spacerH=Math.max(2,r(12*fsc));

        [[gx+gWpx-2,gy+r(gHpx*.18)],[gx+gWpx-2,gy+r(gHpx*.75)]].forEach(([cx,cy])=>h+=`<rect x="${r(cx)}" y="${r(cy)}" width="${cW}" height="${cH}" fill="#888" stroke="#555" stroke-width=".4" rx=".5"/>`);
      }
      // Glass dimensions inside label
      if(gHpx>18&&gWpx>30)h+=`<text x="${r(gx+gWpx/2)}" y="${r(gy-4)}" text-anchor="middle" ${FM} font-size="5.5" fill="#48a8d0" font-weight="600">↑${gO.gH}mm</text>`;

    }

  if(wPx>16){const midHy=r(y0+totalH*0.38);h+=`<text x="${r(x0+wPx/2)}" y="${midHy}" text-anchor="middle" ${FM} font-size="${Math.max(5,Math.min(9,wPx*0.13))}" fill="#555" font-weight="600">${a.code}</text>`;}
  return h;
}

// ── Draw PLAN VIEW accessories for one side ───────────────────
function drawAccListPlan(list,side,pox,poy,pdd,psc){
  if(list.length===0)return{svg:'',totalW:0};
  let h='';
  const totalSideW=accSideTotalW(list);
  const firstGapPx=r(ACC_GAP_MM*psc);
  let offset=ACC_GAP_MM*psc;
  list.forEach((item,idx)=>{
    const a=ACC_BY_CODE[item.code];if(!a)return;
    const itemW=getAccItemW(item);  // ✅ dynamic width
    const wPx=r(itemW*psc);
    let x0;
    if(side==='left'){x0=r(pox-offset-wPx);}
    else{x0=r(pox+offset);}
    h+=drawAccPlanUnit(item,x0,poy,pdd,psc);
    // Dim for this accessory width
    if(wPx>20)h+=tickDim(r(x0),r(x0+wPx),r(poy-14),`${itemW}`,'#c08800');
    // Gap between accessories
    if(idx<list.length-1){
      const gapPx=r(ACC_GAP_MM*psc);
      const gapX=side==='left'?r(x0-gapPx):r(x0+wPx);
      if(gapPx>4)h+=tickDim(gapX,r(gapX+gapPx),r(poy-14),'20','#c06000');
    }
    offset+=wPx+ACC_GAP_MM*psc;
  });
  // Cabinet-to-first-acc gap
  if(firstGapPx>5){
    const gx1=side==='left'?r(pox-firstGapPx):pox;
    const gx2=side==='left'?pox:r(pox+firstGapPx);
    h+=tickDim(Math.min(gx1,gx2),Math.max(gx1,gx2),r(poy-14),'20','#c06000');
  }
  return{svg:h,totalW:totalSideW};
}

// ── Draw FRONT ELEVATION accessories for one side ─────────────
// Returns {svg, totalW} — NO height dims here; they are drawn in drawCAD with staggered offsets
function drawAccListElev(list,side,fox,foy,fgy,fsc,fdw){
  if(list.length===0)return{svg:'',totalW:0};
  let h='';
  const totalSideW=accSideTotalW(list);
  let offset=ACC_GAP_MM*fsc;
  list.forEach((item,idx)=>{
    const a=ACC_BY_CODE[item.code];if(!a)return;
    const itemW=getAccItemW(item);  // ✅ dynamic width
    const wPx=r(itemW*fsc);
    let x0;
    if(side==='left'){x0=r(fox-offset-wPx);}
    else{x0=r(fox+fdw+offset);}
    h+=drawAccElevUnitDyn(item,x0,fgy,fsc);
    // Gap annotation between accessories (small dim)
    if(idx<list.length-1){
      const gapPx=r(ACC_GAP_MM*fsc);
      if(gapPx>5){const gx=side==='left'?r(x0-gapPx):r(x0+wPx);h+=tickDim(gx,r(gx+gapPx),r(fgy-r(a.H*fsc)-14),'20','#c06000');}
    }
    // Width dim for this accessory
    if(wPx>24){const dimY=r(fgy-r(a.H*fsc)-26);h+=tickDim(r(x0),r(x0+wPx),dimY,`${itemW}`,'#c08800');}
    offset+=wPx+ACC_GAP_MM*fsc;
  });
  // First gap dim (cabinet→nearest acc)
  const firstGapPx=r(ACC_GAP_MM*fsc);
  if(firstGapPx>6){
    const firstItemW=getAccItemW(list[0]);
    const firstWpx=r(firstItemW*fsc);
    const nearEdge=side==='left'?r(fox-firstGapPx):r(fox+fdw);
    const farEdge=side==='left'?r(fox-firstGapPx):r(fox+fdw+firstGapPx);
    const maxAccH=Math.max(...list.map(it=>ACC_BY_CODE[it.code]?.H||0));
    const dimY=r(fgy-maxAccH*fsc-14);
    h+=tickDim(Math.min(nearEdge+firstWpx,farEdge),Math.max(nearEdge+firstWpx,farEdge),dimY,'20','#c06000');
  }
  return{svg:h,totalW:totalSideW};
}

// ══ MAIN CAD ══════════════════════════════════════════════════
function drawCAD(){
  const sp=MODELS[M];if(!sp)return;
  const TWg=TWgate(),MAXH=maxH(),pvc=pvcSize(N());
  const TWL=accSideTotalW(accLeft),TWR=accSideTotalW(accRight),TWtotal=TWL+TWg+TWR;

  // Choose scale considering accessories in plan AND elevation
  const pW2=PX.r-PX.l,pH2=P_BOT-P_DT;
  const psc_maxW=TWtotal>0?(pW2-14)/TWtotal:0.05,psc_maxD=(pH2-8)/sp.D;
  const psc=Math.min(psc_maxW,psc_maxD)*.86;
  const pdw=TWg*psc,pdd=sp.D*psc;
  const pLWpx=r(TWL*psc),pRWpx=r(TWR*psc);
  // Gate starts after left accessories
  const totalPlanW=r(pLWpx+pdw+pRWpx);
  const pox=r(PX.l+(pW2-totalPlanW)/2+pLWpx); // gate left edge in plan
  const poy=r(P_DT+(pH2-pdd)/2);

  // Front elevation scale — also considers accessories
  const drawH=fgy-F_DT;
  const fsc_maxW=TWtotal>0?(fW-64)/TWtotal:0.05,fsc_maxH=drawH/MAXH;
  const fsc=Math.min(fsc_maxW,fsc_maxH)*.85;
  const fdw=TWg*fsc,fLWpx=r(TWL*fsc),fRWpx=r(TWR*fsc);
  const totalFrontW=r(fLWpx+fdw+fRWpx);
  const fox=r(FXL+(fW-totalFrontW)/2+fLWpx); // gate left edge in elevation
  const foy=r(fgy-sp.H*fsc);
  const topMostY=r(fgy-MAXH*fsc);
  const gapPx_p=r(GAP_MM*psc),gapPx_f=r(GAP_MM*fsc);

  let h=makeDefs()+`<rect width="720" height="700" fill="#eeede5"/><rect x="8" y="8" width="704" height="684" fill="none" stroke="#111" stroke-width="1.6"/><rect x="11" y="11" width="698" height="678" fill="none" stroke="#aaa" stroke-width=".3"/><line x1="14" y1="${BOT_TOP-1}" x2="706" y2="${BOT_TOP-1}" stroke="#444" stroke-width="1.2"/>`;

  // PLAN titles
  h+=`<text x="${PX.l}" y="${P_TOP+12}" text-anchor="start" ${FM} font-size="9" font-weight="bold" fill="#111" letter-spacing="1.2">${T('planTitle')} — ${T('planTopView')}</text>`;
  h+=`<text x="${PX.l}" y="${P_TOP+24}" text-anchor="start" ${FM} font-size="6.5" fill="#777">${sp.label} · ${sp.sub} · ${T('cotas')}</text>`;

  // Section A-A
  const aay=r(poy+pdd*.44);
  h+=`<line x1="${r(pox-pLWpx-24)}" y1="${aay}" x2="${r(pox-pLWpx-2)}" y2="${aay}" stroke="#555" stroke-width=".5" stroke-dasharray="5 2"/>`;
  h+=`<line x1="${r(pox+pdw+pRWpx+2)}" y1="${aay}" x2="${r(pox+pdw+pRWpx+24)}" y2="${aay}" stroke="#555" stroke-width=".5" stroke-dasharray="5 2"/>`;
  h+=`<text x="${r(pox-pLWpx-26)}" y="${r(aay+3)}" text-anchor="end" ${FM} font-size="7" fill="#444">A</text>`;
  h+=`<text x="${r(pox+pdw+pRWpx+26)}" y="${r(aay+3)}" text-anchor="start" ${FM} font-size="7" fill="#444">A</text>`;

  // Draw accessories in plan (LEFT side — going left from pox)
  const accLplanResult=drawAccListPlan(accLeft,'left',pox,poy,pdd,psc);
  h+=accLplanResult.svg;
  // Draw accessories in plan (RIGHT side — going right from pox+pdw)
  const accRplanResult=drawAccListPlan(accRight,'right',r(pox+pdw),poy,pdd,psc);
  h+=accRplanResult.svg;

  // Gate cabinets in plan
  let pcx=pox;
  for(let i=0;i<=N();i++){

  if(siteLimit>0)h+=limitLine(r(pox-pLWpx),psc,poy-2,r(poy+pdd+4),r(poy+pdd/2));

  // ── COTA HUECO DISPONIBLE en planta (Mejora 9) ───────────────

  // ── NORTH INDICATOR (Mejora 15) ───────────────────────────────
  {const nox=r(PX.r-18),noy=r(P_TOP+20);h+=`<g opacity=".8"><circle cx="${nox}" cy="${noy}" r="13" fill="#eeede5" stroke="#888" stroke-width=".6"/><line x1="${nox}" y1="${r(noy+9)}" x2="${nox}" y2="${r(noy-11)}" stroke="#111" stroke-width="1.2" stroke-linecap="round"/><polygon points="${r(nox-3)},${r(noy-3)} ${nox},${r(noy-11)} ${r(nox+3)},${r(noy-3)}" fill="#333"/><polygon points="${r(nox-3)},${r(noy+3)} ${nox},${r(noy+9)} ${r(nox+3)},${r(noy+3)}" fill="#ddd" stroke="#888" stroke-width=".5"/><text x="${nox}" y="${r(noy-14)}" text-anchor="middle" ${FM} font-size="7" fill="#222" font-weight="bold">N</text></g>`;}

  // ── FRONT ELEVATION ──────────────────────────────────────────

      fecx=r(fecx+lw);
    }
  }
  h+=`</g>`;
  h+=gnd(r(fox-fLWpx),r(fox+fdw+fRWpx),fgy);

  // ── Height dimensions — staggered to avoid overlaps ──────────
  // Cabinet height: just left of gate (not of accessories)
  h+=DV(r(fox-18),foy,fgy,`${sp.H} mm`,false,'#1a5fa0');

  if(N()>0){

  updateAlerts();updateI18nDOM();renderAccBar();autoSave();
}

const PJ_KEY='zkteco-projects-v1';
function getProjects(){try{return JSON.parse(localStorage.getItem(PJ_KEY)||'[]');}catch(e){return[];}}
function _savePJStore(arr){try{localStorage.setItem(PJ_KEY,JSON.stringify(arr));}catch(e){console.error('Projects save error:',e);}}
function saveToProjects(){
  const name=prompt(T('projSave')+':',document.getElementById('f-project').value||'Proyecto');
  if(!name||!name.trim())return;
  const arr=getProjects();if(arr.length>=10){alert(T('projMax'));return;}
  const gv=id=>{const el=document.getElementById(id);return el?el.value:'';};
  arr.unshift({id:Date.now().toString(),name:name.trim(),model:M,nLanes:N(),date:new Date().toLocaleDateString(),tw:rnd(TWfull()),
    data:JSON.stringify({version:'3',ts:Date.now(),model:M,lanes:lanes.map(l=>({pgIdx:l.pgIdx,lfIdx:l.lfIdx})),siteLimit,accLeft,accRight,
      cover:{client:gv('f-client'),project:gv('f-project'),addr:gv('f-addr'),ref:gv('f-ref'),author:gv('f-author'),revby:gv('f-rev'),date:gv('f-date'),version:gv('f-version')}})});
  _savePJStore(arr);renderProjectsModal();
}
function loadFromProjects(id){
  const proj=getProjects().find(p=>p.id===id);if(!proj)return;
  try{
    const d=JSON.parse(proj.data);
    if(d.model&&MODELS[d.model])M=d.model;
    if(Array.isArray(d.lanes)){const sp2=MODELS[M];lanes=d.lanes.map(l=>{const pg=+(l.pgIdx)||0,lf=+(l.lfIdx)||0;const mxP=sp2?sp2.pg.length-1:0,mxL=sp2?sp2.pg[Math.min(pg,mxP)].leaves.length-1:0;return{pgIdx:Math.min(pg,mxP),lfIdx:Math.min(lf,mxL)};});}
    if(lanes.length<1)lanes=[{pgIdx:0,lfIdx:0}];
    if(typeof d.siteLimit==='number'){siteLimit=d.siteLimit;const li=document.getElementById('limit-input');if(li)li.value=siteLimit||'';}
    accLeft=Array.isArray(d.accLeft)?d.accLeft.filter(a=>ACC_BY_CODE[a.code]).map(a=>({...a,r50gW:+(a.r50gW)||920,r50gH:+(a.r50gH)||600})):[];
    accRight=Array.isArray(d.accRight)?d.accRight.filter(a=>ACC_BY_CODE[a.code]).map(a=>({...a,r50gW:+(a.r50gW)||920,r50gH:+(a.r50gH)||600})):[];
    if(d.cover){const c=d.cover;[['f-client',c.client],['f-project',c.project],['f-addr',c.addr],['f-ref',c.ref],['f-author',c.author],['f-rev',c.revby],['f-date',c.date],['f-version',c.version]].forEach(([eid,v])=>{const el=document.getElementById(eid);if(el&&v!=null)el.value=v;});}
    closeProjects();ui();redrawPage();autoSave();
  }catch(err){alert(T('errorLoad')+': '+err.message);}
}
function deleteProject(id){_savePJStore(getProjects().filter(p=>p.id!==id));renderProjectsModal();}
function openProjects(){document.getElementById('proj-modal').style.display='flex';renderProjectsModal();}
function closeProjects(){document.getElementById('proj-modal').style.display='none';}
function renderProjectsModal(){
  const arr=getProjects(),el=document.getElementById('proj-list');if(!el)return;

// ══ VISTA 3D ISOMÉTRICA ═══════════════════════════════════════
function drawISO(){
  const sp=MODELS[M];if(!sp)return;
  const n=N(),TWg=TWgate(),TWL=accSideTotalW(accLeft),TWR=accSideTotalW(accRight),TWtotal=TWfull(),MAXH=maxH();
  const depthZ=sp.D,accDepth=140,W=720,H=480;
  const margin=20;
  const projW=(TWtotal+depthZ)*0.866,projH=MAXH+(TWtotal+depthZ)*0.5;
  const sc=Math.min((W-margin*2)/projW,(H-margin-60)/projH)*0.9;
  const ox=r(margin+depthZ*0.866*sc);
  const oy=r(margin+MAXH*sc);
  const pt=(x,y,z)=>({sx:r(ox+(x-z)*0.866*sc),sy:r(oy+(x+z)*0.5*sc-y*sc)});
  const pp=pts=>pts.map(q=>q.sx+','+q.sy).join(' ');
  const box=(x0,z0,bw,bd,bh,col,al)=>{al=al||.92;
    const f=[pt(x0,0,z0),pt(x0+bw,0,z0),pt(x0+bw,bh,z0),pt(x0,bh,z0)];
    const t=[pt(x0,bh,z0),pt(x0+bw,bh,z0),pt(x0+bw,bh,z0+bd),pt(x0,bh,z0+bd)];
    const s=[pt(x0+bw,0,z0),pt(x0+bw,0,z0+bd),pt(x0+bw,bh,z0+bd),pt(x0+bw,bh,z0)];
    const sk='stroke="rgba(0,0,0,.28)" stroke-width=".5"';
    return `<polygon points="${pp(f)}" fill="${col}" fill-opacity="${al}" ${sk}/>`+
      `<polygon points="${pp(t)}" fill="${col}" fill-opacity="${r(al*.72)}" ${sk}/>`+
      `<polygon points="${pp(t)}" fill="#fff" fill-opacity=".22" stroke="none"/>`+
      `<polygon points="${pp(s)}" fill="${col}" fill-opacity="${r(al*.56)}" ${sk}/>`+
      `<polygon points="${pp(s)}" fill="#000" fill-opacity=".16" stroke="none"/>`;};
  let svg=`<rect width="${W}" height="${H}" fill="#eeede5"/>`;
  svg+=`<rect x="8" y="8" width="${W-16}" height="${H-16}" fill="none" stroke="#14304f" stroke-width="1.2"/>`;
  svg+=`<text x="18" y="24" ${FM} font-size="10" font-weight="bold" fill="#14304f" letter-spacing="1">${T('tabIso').toUpperCase()} — ${sp.label}</text>`;
  svg+=`<text x="18" y="36" ${FM} font-size="7" fill="#777">${sp.sub} · ${n} ${n>1?T('lanes'):T('lane')} · ${rnd(TWtotal)} mm</text>`;
  // Ground shadow
  const gc=[pt(0,0,0),pt(TWtotal,0,0),pt(TWtotal,0,depthZ),pt(0,0,depthZ)];
  svg+=`<polygon points="${pp(gc)}" fill="#bbb" fill-opacity=".25" stroke="#aaa" stroke-width=".4" stroke-dasharray="5 3"/>`;
  // Accessories LEFT
  let axL=0;
  for(let i=0;i<accLeft.length;i++){
    const itm=accLeft[i],acat=ACC_BY_CODE[itm.code],aW=getAccItemW(itm),aH=acat.H;
    const izv=+(itm.isoZ)||1,accZ=izv===0?0:izv===2?depthZ-accDepth:(depthZ-accDepth)/2;
    axL+=ACC_GAP_MM;
    svg+=box(axL,accZ,aW,accDepth,aH,'#c08800',.78);
    if(acat.hasGlass){const gW=acat.customGlass?(+(itm.r50gW)||920):acat.gW,gH=acat.customGlass?(+(itm.r50gH)||600):acat.gH;
      const gX=axL+(aW-gW)/2,gZ=accZ+20;
      const gf=[pt(gX,0,gZ),pt(gX+gW,0,gZ),pt(gX+gW,gH,gZ),pt(gX,gH,gZ)];
      svg+=`<polygon points="${pp(gf)}" fill="#88ccff" fill-opacity=".4" stroke="#5599cc" stroke-width=".8"/>`;}
    axL+=aW;
  }
  // Gate cabinets + lanes
  let cx=TWL;
  for(let i=0;i<=n;i++){
    svg+=box(cx,0,sp.W,depthZ,sp.H,sp.mc,1);
    // Wire dot on front face
    if(i===0||i===n){const wOff=i===0?sp.wireOff:sp.W-sp.wireOff;const wp=pt(cx+wOff,sp.H*.5,0);svg+=`<circle cx="${wp.sx}" cy="${wp.sy}" r="3.5" fill="#1a5fa0" opacity=".85" stroke="#fff" stroke-width=".4"/>`;}
    cx+=sp.W;
    if(i<n){
      const{pg}=getLane(i),lW=pg.s;
      const lf=[pt(cx,0,0),pt(cx+lW,0,0),pt(cx+lW,0,depthZ),pt(cx,0,depthZ)];
      svg+=`<polygon points="${pp(lf)}" fill="#7dd87a" fill-opacity=".1" stroke="rgba(125,216,122,.4)" stroke-width=".6"/>`;
      const lmid=pt(cx+lW/2,2,depthZ/2);
      svg+=`<text x="${lmid.sx}" y="${lmid.sy}" text-anchor="middle" ${FM} font-size="7" fill="#1a7a30" font-weight="bold">${pg.l} mm</text>`;
      cx+=lW;
    }
  }
  // Accessories RIGHT
  let axR=TWL+TWg;
  for(let i=0;i<accRight.length;i++){
    const itm=accRight[i],acat=ACC_BY_CODE[itm.code],aW=getAccItemW(itm),aH=acat.H;
    const izv=+(itm.isoZ)||1,accZ=izv===0?0:izv===2?depthZ-accDepth:(depthZ-accDepth)/2;
    axR+=ACC_GAP_MM;
    svg+=box(axR,accZ,aW,accDepth,aH,'#c08800',.78);
    if(acat.hasGlass){const gW=acat.customGlass?(+(itm.r50gW)||920):acat.gW,gH=acat.customGlass?(+(itm.r50gH)||600):acat.gH;
      const gX=axR+(aW-gW)/2,gZ=accZ+20;
      const gf=[pt(gX,0,gZ),pt(gX+gW,0,gZ),pt(gX+gW,gH,gZ),pt(gX,gH,gZ)];
      svg+=`<polygon points="${pp(gf)}" fill="#88ccff" fill-opacity=".4" stroke="#5599cc" stroke-width=".8"/>`;}
    axR+=aW;
  }
  // Total width dimension line
  const dL=pt(0,0,depthZ),dR=pt(TWtotal,0,depthZ);
  const dY=12;
  svg+=`<line x1="${dL.sx}" y1="${dL.sy+dY}" x2="${dR.sx}" y2="${dR.sy+dY}" stroke="#14304f" stroke-width=".8"/>`;
  svg+=`<line x1="${dL.sx}" y1="${dL.sy+dY-5}" x2="${dL.sx}" y2="${dL.sy+dY+5}" stroke="#14304f" stroke-width=".8"/>`;
  svg+=`<line x1="${dR.sx}" y1="${dR.sy+dY-5}" x2="${dR.sx}" y2="${dR.sy+dY+5}" stroke="#14304f" stroke-width=".8"/>`;
  svg+=`<text x="${r((dL.sx+dR.sx)/2)}" y="${r((dL.sy+dR.sy)/2+dY+12)}" text-anchor="middle" ${FM} font-size="8" fill="#14304f" font-weight="bold">${rnd(TWtotal)} mm</text>`;
  // Depth dimension
  const dp1=pt(TWtotal,0,0),dp2=pt(TWtotal,0,depthZ);
  const dx=10;
  svg+=`<line x1="${dp1.sx+dx}" y1="${dp1.sy}" x2="${dp2.sx+dx}" y2="${dp2.sy}" stroke="#666" stroke-width=".6" stroke-dasharray="3 2"/>`;
  svg+=`<text x="${dp2.sx+dx+5}" y="${r((dp1.sy+dp2.sy)/2+3)}" ${FM} font-size="6.5" fill="#666">${sp.D} mm</text>`;
  // Height dimension
  const hp1=pt(0,0,0),hp2=pt(0,sp.H,0);
  const hx=-8;
  svg+=`<line x1="${hp1.sx+hx}" y1="${hp1.sy}" x2="${hp2.sx+hx}" y2="${hp2.sy}" stroke="#666" stroke-width=".6" stroke-dasharray="3 2"/>`;
  svg+=`<text x="${hp1.sx+hx-3}" y="${r((hp1.sy+hp2.sy)/2+3)}" text-anchor="end" ${FM} font-size="6.5" fill="#666">${rnd(sp.H)} mm</text>`;
  document.getElementById('isosvg').innerHTML=svg;
}

// ══ COMPARADOR DE MODELOS ═════════════════════════════════════
function drawComparator(){
  const W=720,H=520,colX=94,colW=r((W-colX-14)/MK.length);
  let svg=`<rect width="${W}" height="${H}" fill="#eeede5"/>`;
  svg+=`<rect x="8" y="8" width="${W-16}" height="${H-16}" fill="none" stroke="#14304f" stroke-width="1.2"/>`;
  svg+=`<text x="${W/2}" y="27" text-anchor="middle" ${FM} font-size="10" font-weight="bold" fill="#14304f" letter-spacing="2">${T('tabComp').toUpperCase()}</text>`;
  // Model headers
  MK.forEach((k,i)=>{
    const sp=MODELS[k],cx=r(colX+i*colW+colW/2),isActive=k===M;
    if(isActive)svg+=`<rect x="${r(colX+i*colW+3)}" y="32" width="${r(colW-6)}" height="56" fill="${sp.mc}" fill-opacity=".1" rx="4"/>`;
    svg+=`<rect x="${r(colX+i*colW+8)}" y="33" width="${r(colW-16)}" height="2.5" fill="${sp.mc}" rx="1"/>`;
    svg+=`<text x="${cx}" y="48" text-anchor="middle" ${FM} font-size="${isActive?9.5:9}" font-weight="bold" fill="${sp.mc}">${sp.labelEnd.split(/[\s/]/)[0]}</text>`;
    svg+=`<text x="${cx}" y="59" text-anchor="middle" ${FM} font-size="6.5" fill="#888">${sp.sub.split('·')[0].trim()}</text>`;
    svg+=`<text x="${cx}" y="70" text-anchor="middle" ${FM} font-size="8" font-weight="bold" fill="${isActive?sp.mc:'#555'}">${sp.consumption}</text>`;
    if(isActive)svg+=`<text x="${cx}" y="82" text-anchor="middle" ${FM} font-size="6" fill="${sp.mc}">◀ ${T('compActive')} ▶</text>`;
  });
  const rowDefs=[
    {lbl:T('compW'),vals:MK.map(k=>MODELS[k].W),unit:'mm',bar:true,max:155},
    {lbl:T('compD'),vals:MK.map(k=>MODELS[k].D),unit:'mm',bar:true,max:1700},
    {lbl:T('compH'),vals:MK.map(k=>r(MODELS[k].H)),unit:'mm',bar:true,max:1100},
    {lbl:T('compCons'),vals:MK.map(k=>parseInt(MODELS[k].consumption)||0),unit:'W',bar:true,max:200},
    {lbl:T('compSpeed'),vals:MK.map(k=>MODELS[k].openSpeed),unit:'',bar:false,max:0},
    {lbl:T('compTemp'),vals:MK.map(k=>MODELS[k].tempRange),unit:'',bar:false,max:0},
    {lbl:T('compPower'),vals:MK.map(k=>MODELS[k].power),unit:'',bar:false,max:0},
    {lbl:T('compBolts'),vals:MK.map(k=>MODELS[k].bolts.length),unit:'',bar:false,max:0},
    {lbl:T('compLanes'),vals:MK.map(k=>MODELS[k].pg.map(p=>p.l).join(' / ')),unit:'mm',bar:false,max:0},
  ];
  const rStart=88,rH=r((H-rStart-12)/rowDefs.length);
  rowDefs.forEach((rd,ri)=>{
    const ry=rStart+ri*rH;
    if(ri%2===0)svg+=`<rect x="10" y="${ry}" width="${W-20}" height="${rH}" fill="rgba(0,0,0,.04)"/>`;
    svg+=`<text x="${colX-5}" y="${r(ry+rH/2+3.5)}" text-anchor="end" ${FM} font-size="7.5" fill="#666">${rd.lbl}</text>`;
    MK.forEach((k,i)=>{
      const sp=MODELS[k],cx=r(colX+i*colW+colW/2),val=rd.vals[i],isActive=k===M,fc=isActive?sp.mc:'#333';
      if(rd.bar&&typeof val==='number'){
        const bx=r(colX+i*colW+8),bMaxW=colW-16,bW=r((val/rd.max)*bMaxW),barY=r(ry+rH-8);
        svg+=`<rect x="${bx}" y="${barY}" width="${bMaxW}" height="4" fill="rgba(0,0,0,.1)" rx="2"/>`;
        svg+=`<rect x="${bx}" y="${barY}" width="${bW}" height="4" fill="${sp.mc}" fill-opacity=".75" rx="2"/>`;
        svg+=`<text x="${cx}" y="${r(ry+rH/2+2)}" text-anchor="middle" ${FM} font-size="${isActive?10:9}" font-weight="bold" fill="${fc}">${val} ${rd.unit}</text>`;
      }else{
        svg+=`<text x="${cx}" y="${r(ry+rH/2+3)}" text-anchor="middle" ${FM} font-size="7.5" fill="${fc}">${val}${rd.unit?' '+rd.unit:''}</text>`;
      }
    });
  });
  document.getElementById('cmpsvg').innerHTML=svg;
}

// ══ UNDO / REDO ═══════════════════════════════════════════════
const undoStack=[],redoStack=[];
function _stateSnap(){return JSON.stringify({M,lanes:lanes.map(l=>({...l})),siteLimit,siteLen,accLeft:accLeft.map(a=>({...a})),accRight:accRight.map(a=>({...a}))});}
function pushUndo(label){undoStack.push({snap:_stateSnap(),lbl:label||'—'});if(undoStack.length>30)undoStack.shift();redoStack.length=0;_updateUndoUI();}
function _applySnap(entry){
  const d=JSON.parse(typeof entry==='string'?entry:entry.snap);
  if(MODELS[d.M])M=d.M;
  lanes=d.lanes.map(l=>({...l}));
  siteLimit=d.siteLimit;siteLen=d.siteLen||0;
  const li=document.getElementById('limit-input');if(li)li.value=siteLimit||'';
  const sl=document.getElementById('site-len');if(sl)sl.value=siteLen||'';
  accLeft=d.accLeft.map(a=>({...a}));
  accRight=d.accRight.map(a=>({...a}));
}
function undo(){if(!undoStack.length)return;redoStack.push({snap:_stateSnap(),lbl:'↩'});_applySnap(undoStack.pop());ui();redrawPage();autoSave();_updateUndoUI();}
function redo(){if(!redoStack.length)return;undoStack.push({snap:_stateSnap(),lbl:'↪'});_applySnap(redoStack.pop());ui();redrawPage();autoSave();_updateUndoUI();}
function _updateUndoUI(){
  const bu=document.getElementById('btn-undo'),br=document.getElementById('btn-redo');
  if(bu)bu.disabled=!undoStack.length;if(br)br.disabled=!redoStack.length;
  const panel=document.getElementById('undo-panel');if(!panel)return;
  if(!undoStack.length){panel.innerHTML='';return;}
  const labels=[...undoStack].reverse().slice(0,6).map(e=>e.lbl||'—');
  panel.innerHTML=`<div class="undo-hist-line">↺ ${undoStack.length} ${T('undoHistLbl')}: ${labels.join(' · ')}</div>`;
}
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key==='z'&&!e.target.matches('input,textarea')){e.preventDefault();undo();}
  if((e.ctrlKey||e.metaKey)&&((e.shiftKey&&e.key==='z')||e.key==='y')&&!e.target.matches('input,textarea')){e.preventDefault();redo();}
});

// ══ SHARE URL ═════════════════════════════════════════════════
function shareURL(){
  const gv=id=>{const el=document.getElementById(id);return el?el.value:'';};
  const state={v:3,m:M,l:lanes.map(l=>({p:l.pgIdx,f:l.lfIdx})),sl:siteLimit,
    al:accLeft.map(a=>({c:a.code,g:a.r50gW,h:a.r50gH})),
    ar:accRight.map(a=>({c:a.code,g:a.r50gW,h:a.r50gH})),
    cv:{cl:gv('f-client'),pr:gv('f-project'),ad:gv('f-addr'),rf:gv('f-ref'),au:gv('f-author'),rv:gv('f-rev'),dt:gv('f-date'),vr:gv('f-version')}};
  const hash='#s='+btoa(encodeURIComponent(JSON.stringify(state)));
  const url=location.href.replace(/#.*/,'')+hash;
  history.replaceState(null,'',hash);
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(()=>showToast(T('urlCopied'))).catch(()=>showToast(T('urlCopyManual')));
  } else {
    try{const ta=document.createElement('textarea');ta.value=url;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();showToast(T('urlCopied'));}
    catch(e){showToast(T('urlCopyManual'));}
  }
}
function loadFromHash(){
  try{
    const m=location.hash.match(/[#&]s=([^&]+)/);
    if(!m)return false;
    const d=JSON.parse(decodeURIComponent(atob(m[1])));
    if(d.m&&MODELS[d.m])M=d.m;
    if(Array.isArray(d.l)){const sp=MODELS[M];lanes=d.l.map(l=>{const pgC=Math.min(+(l.p)||0,sp.pg.length-1),mxL=sp.pg[pgC].leaves.length-1;return{pgIdx:pgC,lfIdx:Math.min(+(l.f)||0,mxL)};});}
    if(lanes.length<1)lanes=[{pgIdx:0,lfIdx:0}];
    if(typeof d.sl==='number'){siteLimit=d.sl;const li=document.getElementById('limit-input');if(li)li.value=siteLimit||'';}
    accLeft=Array.isArray(d.al)?d.al.filter(a=>ACC_BY_CODE[a.c]).map(a=>({code:a.c,r50gW:+(a.g)||920,r50gH:+(a.h)||600})):[];
    accRight=Array.isArray(d.ar)?d.ar.filter(a=>ACC_BY_CODE[a.c]).map(a=>({code:a.c,r50gW:+(a.g)||920,r50gH:+(a.h)||600})):[];
    if(d.cv){const c=d.cv;[['f-client',c.cl],['f-project',c.pr],['f-addr',c.ad],['f-ref',c.rf],['f-author',c.au],['f-rev',c.rv],['f-date',c.dt],['f-version',c.vr]].forEach(([eid,v])=>{const el=document.getElementById(eid);if(el&&v!=null)el.value=v;});}
    return true;
  }catch(e){return false;}
}

// ══ PRESETS ═══════════════════════════════════════════════════
const PRESETS={
  std2: {m:'sbtl8000',l:[{pgIdx:0,lfIdx:0},{pgIdx:0,lfIdx:0}]},
  wide1:{m:'sbtl8000',l:[{pgIdx:1,lfIdx:0}]},
  mix3: {m:'sbtl8000',l:[{pgIdx:0,lfIdx:0},{pgIdx:1,lfIdx:0},{pgIdx:0,lfIdx:0}]},
  xl2:  {m:'sbtl8000',l:[{pgIdx:2,lfIdx:0},{pgIdx:2,lfIdx:0}]},
  acc4: {m:'sbtl8000',l:[{pgIdx:0,lfIdx:0},{pgIdx:0,lfIdx:0},{pgIdx:0,lfIdx:0},{pgIdx:0,lfIdx:0}]},
};
function applyPreset(key){
  const p=PRESETS[key];if(!p)return;
  pushUndo();
  if(MODELS[p.m])M=p.m;
  const sp=MODELS[M];
  lanes=p.l.map(l=>{const mxP=sp.pg.length-1,pg=Math.min(l.pgIdx,mxP),mxL=sp.pg[pg].leaves.length-1;return{pgIdx:pg,lfIdx:Math.min(l.lfIdx,mxL)};});
  ui();redrawPage();autoSave();showToast(T('presetApplied'));
}

// ══ DXF EXPORT ════════════════════════════════════════════════
function _dxfLine(x1,y1,x2,y2,layer){return'0\nLINE\n8\n'+(layer||'0')+'\n10\n'+r(x1)+'\n20\n'+r(y1)+'\n11\n'+r(x2)+'\n21\n'+r(y2)+'\n';}
function _dxfRect(x,y,w,h,layer){const l=layer||'0';return _dxfLine(x,y,x+w,y,l)+_dxfLine(x+w,y,x+w,y+h,l)+_dxfLine(x+w,y+h,x,y+h,l)+_dxfLine(x,y+h,x,y,l);}
function _dxfText(x,y,txt,ht,layer){return'0\nTEXT\n8\n'+(layer||'ANNO')+'\n10\n'+r(x)+'\n20\n'+r(y)+'\n40\n'+(ht||80)+'\n1\n'+String(txt).replace(/\n/g,' ')+'\n72\n1\n11\n'+r(x)+'\n21\n'+r(y)+'\n';}
function exportDXF(){
  const sp=MODELS[M],n=N();
  let dxf='',x=0;
  // Left accessories
  accLeft.forEach(item=>{
    const aw=getAccItemW(item),ah=item.H||950;
    dxf+=_dxfRect(x,0,aw,ah,'ACC');
    dxf+=_dxfText(x+aw/2,ah/2,item.code,80,'ANNO');
    x+=aw+ACC_GAP_MM;
  });
  if(accLeft.length)x+=ACC_GAP_MM;
  // Cabinets + lanes
  for(let i=0;i<=n;i++){
    dxf+=_dxfRect(x,0,sp.W,sp.D,'CABS');
    dxf+=_dxfText(x+sp.W/2,sp.D/2,(i===0?sp.labelEnd:sp.labelCentral),60,'ANNO');
    x+=sp.W;
    if(i<n)x+=getLane(i).pg.s;
  }
  // Right accessories
  if(accRight.length)x+=ACC_GAP_MM;
  accRight.forEach(item=>{
    const aw=getAccItemW(item),ah=item.H||950;
    dxf+=_dxfRect(x,0,aw,ah,'ACC');
    dxf+=_dxfText(x+aw/2,ah/2,item.code,80,'ANNO');
    x+=aw+ACC_GAP_MM;
  });
  const tw=TWfull();
  dxf+=_dxfLine(0,-200,tw,-200,'DIM');
  dxf+=_dxfLine(0,-180,0,-220,'DIM')+_dxfLine(tw,-180,tw,-220,'DIM');
  dxf+=_dxfText(tw/2,-300,'TW='+rnd(tw)+' mm',120,'DIM');
  if(siteLimit>0){
    dxf+=_dxfLine(0,-380,siteLimit,-380,'LIMIT');
    dxf+=_dxfLine(0,-360,0,-400,'LIMIT')+_dxfLine(siteLimit,-360,siteLimit,-400,'LIMIT');
    dxf+=_dxfText(siteLimit/2,-450,T('maxLbl')+' '+rnd(siteLimit)+' mm',100,'LIMIT');
  }
  const hdr='0\nSECTION\n2\nHEADER\n9\n$ACADVER\n1\nAC1014\n9\n$EXTMIN\n10\n-100\n20\n-500\n9\n$EXTMAX\n10\n'+r(tw+200)+'\n20\n'+r(sp.D+100)+'\n0\nENDSEC\n0\nSECTION\n2\nENTITIES\n';
  const blob=new Blob([hdr+dxf+'0\nENDSEC\n0\nEOF\n'],{type:'application/dxf'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='ZKTeco_'+M+'_'+n+'L.dxf';a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),5000);
  showToast('DXF exportado ✓');
}

// ══ BILL OF MATERIALS ═════════════════════════════════════════
function drawBOM(){
  const sp=MODELS[M],n=N(),nCentral=Math.max(0,n-1);
  const pvc=pvcSize(n),cables=T('cables');
  const items=[];
  items.push({qty:1,ref:sp.labelEnd,desc:sp.label+' · '+sp.sub});
  if(nCentral>0)items.push({qty:nCentral,ref:sp.labelCentral,desc:sp.label+' · Central'});
  const leafG={};
  Array.from({length:n},(_,i)=>{const lf=getLane(i).lf;if(!leafG[lf.gmp])leafG[lf.gmp]={qty:0,ref:lf.gmp,desc:lf.label};leafG[lf.gmp].qty+=2;});
  Object.values(leafG).forEach(g=>items.push(g));
  const accG={};
  [...accLeft,...accRight].forEach(a=>{if(!accG[a.code])accG[a.code]={qty:0,ref:a.code,desc:accLbl(ACC_BY_CODE[a.code])};accG[a.code].qty++;});
  Object.values(accG).forEach(g=>items.push(g));
  items.push({qty:1,ref:'PVC-Ø'+pvc.d,desc:T('bomPVC')+' '+pvc.label});
  if(Array.isArray(cables))cables.forEach((c,i)=>items.push({qty:n+1,ref:'CBL-'+(i+1),desc:c}));
  const el=document.getElementById('bom-content');if(!el)return;
  const grid='display:grid;grid-template-columns:40px 150px 1fr;gap:2px 8px;font-family:monospace;';
  const hdr=`<div class="bom-hdr" style="${grid}font-size:9px;font-weight:700;color:rgba(255,255,255,.5);padding:4px 0;border-bottom:1px solid rgba(255,255,255,.15);margin-bottom:2px"><span>${T('bomQty')}</span><span>${T('bomGMP')}</span><span>${T('bomDesc')}</span></div>`;
  const rows=items.map(it=>`<div class="bom-sep" style="${grid}font-size:9.5px;padding:2.5px 0;border-bottom:1px solid rgba(255,255,255,.06);align-items:center"><span class="bom-qty" style="color:#7dd87a;font-weight:700">${it.qty}×</span><span class="bom-ref" style="color:#b0b8c8">${it.ref}</span><span class="bom-desc" style="color:#d0d8e4">${it.desc}</span></div>`).join('');
  const total=items.reduce((s,it)=>s+it.qty,0);
  const foot=`<div class="bom-foot" style="${grid}font-size:10px;font-weight:700;color:#7dd87a;padding:6px 0 2px;border-top:1px solid rgba(255,255,255,.2);margin-top:2px"><span>${total}×</span><span style="grid-column:2/4">${T('bomTotal')}</span><span></span></div>`;
  el.innerHTML=hdr+rows+foot;
}
function exportBOM(fmt){
  if(fmt!=='csv')return;
  const sp=MODELS[M],n=N(),nCentral=Math.max(0,n-1);
  const pvc=pvcSize(n),cables=T('cables');
  const rows=[[T('bomQty'),T('bomGMP'),T('bomDesc')]];
  rows.push([1,sp.labelEnd,sp.label]);
  if(nCentral>0)rows.push([nCentral,sp.labelCentral,sp.label+' Central']);
  const leafG={};
  Array.from({length:n},(_,i)=>{const lf=getLane(i).lf;if(!leafG[lf.gmp])leafG[lf.gmp]={qty:0,gmp:lf.gmp,lbl:lf.label};leafG[lf.gmp].qty+=2;});
  Object.values(leafG).forEach(g=>rows.push([g.qty,g.gmp,g.lbl]));
  [...accLeft,...accRight].forEach(a=>rows.push([1,a.code,accLbl(ACC_BY_CODE[a.code])]));
  rows.push([1,'PVC-Ø'+pvc.d,T('bomPVC')+' '+pvc.label]);
  if(Array.isArray(cables))cables.forEach((c,i)=>rows.push([n+1,'CBL-'+(i+1),c]));
  const csv=rows.map(row=>row.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='BOM_ZKTeco_'+M+'.csv';a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),5000);
  showToast('CSV exportado ✓');
}
function printBOM(){drawBOM();window.print();}

// ══ SITE LENGTH + CABLE ESTIMATE ══════════════════════════════
function onSiteLenChange(){
  const val=parseFloat(document.getElementById('site-len').value)||0;
  siteLen=Math.max(0,val);_updateCableEst();autoSave();
}
function _updateCableEst(){
  const el=document.getElementById('cable-est');if(!el)return;
  if(!siteLen){el.textContent='';return;}
  const nCab=N()+1,cbl=T('cables');
  const nTypes=Array.isArray(cbl)?cbl.length:4;
  const totalM=Math.round(siteLen*nCab*nTypes*1.15);
  el.textContent=`≈${totalM}m ${T('cableTotLbl')||''}`;
}

// ══ PROJECTS MINI THUMBNAIL ════════════════════════════════════
function _projectMiniSVG(model,nLanes){
  const sp=MODELS[model];if(!sp)return'';
  const n=nLanes||1,cw=14,lw=22,W=150,H=36;
  const totalW=(n+1)*cw+n*lw,sc=Math.min((W-16)/totalW,(H-8)/44);
  let x=(W-totalW*sc)/2,my=H/2;
  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:150px;height:36px;display:block;border-radius:3px;overflow:hidden">`;
  svg+=`<rect width="${W}" height="${H}" fill="rgba(20,48,79,.06)" rx="3"/>`;
  for(let i=0;i<=n;i++){
    svg+=`<rect x="${r(x)}" y="${r(my-9)}" width="${r(cw*sc)}" height="18" fill="${sp.mc}" rx="1" opacity=".85"/>`;
    x+=cw*sc;
    if(i<n){svg+=`<rect x="${r(x)}" y="${r(my-6)}" width="${r(lw*sc)}" height="12" fill="#bdd9ef" rx="1" opacity=".55"/>`;x+=lw*sc;}
  }
  svg+=`</svg>`;return svg;
}
