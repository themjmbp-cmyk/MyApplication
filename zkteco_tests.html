<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>ZKTeco CAD — Tests de Regresión</title>
<style>
:root{--pass:#1a7a30;--fail:#cc1111;--warn:#c08800;--bg:#0d1f30;--nv:#14304f;--t2:#a8bdd4}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t2);font-family:monospace;padding:20px;font-size:12px}
h1{color:#7dd87a;font-size:16px;margin-bottom:4px}
.sub{color:rgba(168,189,212,.5);font-size:10px;margin-bottom:20px}
.suite{background:var(--nv);border-radius:8px;padding:12px 16px;margin-bottom:12px}
.suite-title{font-size:12px;font-weight:700;color:#fff;margin-bottom:8px;letter-spacing:.5px}
.test{display:flex;align-items:flex-start;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.test:last-child{border:none}
.badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;flex-shrink:0;margin-top:1px;min-width:40px;text-align:center}
.pass{background:rgba(26,122,48,.25);color:#7dd87a}
.fail{background:rgba(204,17,17,.25);color:#ff8080}
.warn{background:rgba(192,136,0,.25);color:#f0c060}
.test-name{flex:1;color:#c8d8e8}
.test-detail{color:rgba(168,189,212,.5);font-size:10px;margin-top:1px}
#summary{position:fixed;top:16px;right:20px;background:var(--nv);border-radius:8px;padding:10px 16px;font-size:11px}
.sum-pass{color:#7dd87a;font-weight:700}.sum-fail{color:#ff8080;font-weight:700}.sum-warn{color:#f0c060}
button{background:rgba(125,216,122,.15);color:#7dd87a;border:1px solid rgba(125,216,122,.3);border-radius:6px;padding:6px 14px;cursor:pointer;font-family:monospace;font-size:11px;margin-top:16px}
button:hover{background:rgba(125,216,122,.25)}
#app-frame{display:none}
</style>
</head>
<body>
<h1>ZKTeco SpeedGate CAD — Tests de Regresión</h1>
<p class="sub">Suite de pruebas automatizadas · Carga la app en iframe y verifica funciones clave</p>
<div id="summary">Cargando…</div>
<button onclick="runAll()">▶ Ejecutar todos</button>
<div id="results"></div>
<iframe id="app-frame" src="zkteco_v35_optimized.html" style="width:0;height:0;border:none;position:fixed;left:-9999px"></iframe>

<script>
const results=[];
let app=null;

function assert(name,cond,detail=''){
  results.push({name,pass:cond===true,warn:cond==='warn',detail});
  return cond===true;
}

function updateSummary(){
  const pass=results.filter(r=>r.pass).length;
  const fail=results.filter(r=>!r.pass&&!r.warn).length;
  const warn=results.filter(r=>r.warn).length;
  document.getElementById('summary').innerHTML=
    `<span class="sum-pass">✓ ${pass}</span>  <span class="sum-fail">✗ ${fail}</span>  <span class="sum-warn">⚠ ${warn}</span>  / ${results.length}`;
}

function renderResults(){
  const suites={};
  results.forEach(r=>{
    const [suite,...rest]=r.name.split('/');
    if(!suites[suite])suites[suite]=[];
    suites[suite].push({...r,name:rest.join('/')||r.name});
  });
  document.getElementById('results').innerHTML=Object.entries(suites).map(([title,tests])=>`
    <div class="suite">
      <div class="suite-title">${title}</div>
      ${tests.map(t=>`<div class="test">
        <span class="badge ${t.pass?'pass':t.warn?'warn':'fail'}">${t.pass?'PASS':t.warn?'WARN':'FAIL'}</span>
        <div><div class="test-name">${t.name}</div>${t.detail?`<div class="test-detail">${t.detail}</div>`:''}</div>
      </div>`).join('')}
    </div>`).join('');
  updateSummary();
}

function runAll(){
  results.length=0;
  document.getElementById('results').innerHTML='<div style="color:var(--t2);padding:20px">Cargando app…</div>';
  document.getElementById('app-frame').style.display='block';
  const frame=document.getElementById('app-frame');
  frame.onload=()=>{
    try{app=frame.contentWindow;}catch(e){assert('General/Acceso al iframe',false,'CORS o file:// bloqueado: '+e.message);renderResults();return;}
    setTimeout(runTests,500);
  };
  frame.src='zkteco_v35_optimized.html?t='+Date.now();
}

function runTests(){
  const w=app;

  // ── MODELOS ──────────────────────────────────────────────────
  assert('Modelos/MODELS definido',typeof w.MODELS==='object'&&Object.keys(w.MODELS).length>=4,`${Object.keys(w.MODELS||{}).length} modelos encontrados`);
  assert('Modelos/Modelo activo válido',w.M&&w.MODELS[w.M],`M='${w.M}'`);
  ['sbtl8000','comet','mars','mars_s100'].forEach(k=>{
    assert(`Modelos/${k} pg array`,Array.isArray(w.MODELS[k]?.pg)&&w.MODELS[k].pg.length>0,`${w.MODELS[k]?.pg?.length} configs`);
    assert(`Modelos/${k} leaves`,w.MODELS[k]?.pg?.every(p=>p.leaves?.length>0),'al menos 1 hoja por config');
  });

  // ── I18N ─────────────────────────────────────────────────────
  const langs=['es','en','pt','fr','de'];
  const requiredKeys=['planTitle','tabCad','tabBOM','bomTotal','presetApplied','urlCopied','isoPos','isoPosF','isoPosM','isoPosB','pmrTag','siteLenLbl'];
  langs.forEach(l=>{
    requiredKeys.forEach(k=>{
      const val=w.I18N[l]?.[k];
      assert(`I18N/${l}/${k}`,!!val,val||'MISSING');
    });
  });

  // ── DIMENSIONES ───────────────────────────────────────────────
  const n=w.N();
  assert('Dimensiones/N() ≥ 1',n>=1,`N=${n}`);
  const twg=w.TWgate();
  assert('Dimensiones/TWgate > 0',twg>100,`TWgate=${twg}mm`);
  const twf=w.TWfull();
  assert('Dimensiones/TWfull >= TWgate',twf>=twg,`TWfull=${twf} TWgate=${twg}`);
  assert('Dimensiones/maxH > 0',w.maxH()>0,`${w.maxH()}mm`);

  // ── PASILLOS ─────────────────────────────────────────────────
  assert('Pasillos/getLane(0) válido',()=>{const l=w.getLane(0);return l&&l.pg&&l.lf;}());
  for(let i=0;i<n;i++){
    const lane=w.getLane(i);
    assert(`Pasillos/lane ${i+1} pg.c > 0`,lane?.pg?.c>0,`c=${lane?.pg?.c}mm`);
    assert(`Pasillos/lane ${i+1} lf.topH > 0`,lane?.lf?.topH>0,`topH=${lane?.lf?.topH}mm`);
  }

  // ── PVC ───────────────────────────────────────────────────────
  const pvc=w.pvcSize(n);
  assert('PVC/pvcSize retorna objeto',pvc&&pvc.d&&pvc.label,`d=${pvc?.d} label=${pvc?.label}`);
  assert('PVC/diámetro válido',[50,63,75].includes(pvc.d),`d=${pvc.d}`);

  // ── ACCESORIOS ────────────────────────────────────────────────
  assert('Accesorios/ACC_CAT length',w.ACC_CAT?.length>=5,`${w.ACC_CAT?.length} accesorios`);
  assert('Accesorios/ACC_BY_CODE R10',!!w.ACC_BY_CODE?.R10,'R10 debe existir');
  assert('Accesorios/getAccItemW R10',w.getAccItemW({code:'R10',r50gW:920,r50gH:600})===500,'R10=500mm');
  assert('Accesorios/getAccItemW R50',w.getAccItemW({code:'R50',r50gW:1200,r50gH:700})===1300,'R50 custom 1200+100=1300mm');

  // ── DRAWCAD ────────────────────────────────────────────────────
  try{
    w.drawCAD();
    const cvInner=w.document.getElementById('cv')?.innerHTML||'';
    assert('drawCAD/SVG no vacío',cvInner.length>200,`${cvInner.length} chars`);
    assert('drawCAD/contiene rect',cvInner.includes('<rect'),'rect encontrado');
    assert('drawCAD/contiene polygon o path',cvInner.includes('<polygon')||cvInner.includes('<path'));
    assert('drawCAD/contiene text',cvInner.includes('<text'));
  }catch(e){assert('drawCAD/sin errores',false,e.message);}

  // ── DRAWBOM ────────────────────────────────────────────────────
  try{
    w.setPage('bom');
    const bomEl=w.document.getElementById('bom-content');
    assert('drawBOM/bom-content no vacío',(bomEl?.innerHTML?.length||0)>50,`${bomEl?.innerHTML?.length} chars`);
  }catch(e){assert('drawBOM/sin errores',false,e.message);}

  // ── DRAWISO ────────────────────────────────────────────────────
  try{
    w.setPage('iso');
    const isoEl=w.document.getElementById('isosvg');
    assert('drawISO/isosvg no vacío',(isoEl?.innerHTML?.length||0)>200,`${isoEl?.innerHTML?.length} chars`);
  }catch(e){assert('drawISO/sin errores',false,e.message);}

  // ── UNDO/REDO ─────────────────────────────────────────────────
  try{
    w.setPage('cad');
    const before=w.N();
    w.pushUndo('test');
    assert('Undo/pushUndo añade al stack',w.undoStack.length>=1,`stack=${w.undoStack.length}`);
    w.undo();
    assert('Undo/undo restaura estado',w.N()===before,`N antes=${before} después=${w.N()}`);
  }catch(e){assert('Undo/sin errores',false,e.message);}

  // ── PRESETS ───────────────────────────────────────────────────
  try{
    const prev=w.N();
    w.applyPreset('std2');
    assert('Presets/std2 aplica 2 pasillos',w.N()===2,`N=${w.N()}`);
    assert('Presets/std2 modelo sbtl8000',w.M==='sbtl8000',`M=${w.M}`);
    w.applyPreset('wide1');
    assert('Presets/wide1 aplica 1 pasillo',w.N()===1,`N=${w.N()}`);
  }catch(e){assert('Presets/sin errores',false,e.message);}

  // ── SHARE URL ─────────────────────────────────────────────────
  try{
    const ok=w.loadFromHash();
    assert('ShareURL/loadFromHash retorna bool',typeof ok==='boolean','ok='+ok);
  }catch(e){assert('ShareURL/sin errores',false,e.message);}

  // ── DXF ───────────────────────────────────────────────────────
  try{
    let downloaded=false;
    const origCreate=URL.createObjectURL;
    URL.createObjectURL=()=>{downloaded=true;return'blob:test';};
    const origClick=HTMLAnchorElement.prototype.click;
    HTMLAnchorElement.prototype.click=function(){};
    w.exportDXF();
    URL.createObjectURL=origCreate;
    HTMLAnchorElement.prototype.click=origClick;
    assert('DXF/exportDXF genera blob',downloaded,'blob creado ✓');
  }catch(e){assert('DXF/sin errores',false,e.message);}

  // ── AUTOGUARDADO ──────────────────────────────────────────────
  try{
    w.autoSave();
    const raw=w.localStorage.getItem(w.LS_KEY);
    assert('AutoSave/localStorage no vacío',!!raw,`${raw?.length} chars`);
    const parsed=JSON.parse(raw);
    assert('AutoSave/version 3',parsed.version==='3',`v=${parsed.version}`);
    assert('AutoSave/modelo guardado',!!parsed.model,`model=${parsed.model}`);
    assert('AutoSave/siteLen guardado',typeof parsed.siteLen!=='undefined',`siteLen=${parsed.siteLen}`);
  }catch(e){assert('AutoSave/sin errores',false,e.message);}

  // ── MODO CLARO ────────────────────────────────────────────────
  try{
    const html=w.document.documentElement;
    const wasLight=html.classList.contains('lt');
    w.toggleTheme();
    assert('Tema/toggleTheme cambia clase lt',html.classList.contains('lt')!==wasLight,'toggle OK');
    w.toggleTheme(); // restaurar
  }catch(e){assert('Tema/sin errores',false,e.message);}

  renderResults();
}

// Auto-run on load
window.addEventListener('load',()=>setTimeout(runAll,300));
</script>
</body>
</html>
